<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CardMaker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #F0F2F7;
  --surface:  #FFFFFF;
  --blue:     #2563EB;
  --blue-lt:  #EFF4FF;
  --text:     #1E1E2E;
  --sub:      #64748B;
  --border:   #E2E8F0;
  --danger:   #EF4444;
  --danger-lt:#FEF2F2;
  --radius:   14px;
  --radius-sm:8px;
  --shadow:   0 2px 8px rgba(0,0,0,.07);
  --shadow-md:0 4px 20px rgba(0,0,0,.10);
}
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

/* ── 画面 ── */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 56px; display: flex; align-items: center;
  padding: 0 1rem; gap: .75rem;
  position: sticky; top: 0; z-index: 100; flex-shrink: 0;
}
.topbar-title { font-size: 16px; font-weight: 700; flex: 1; }
.topbar-back {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--sub); border-radius: 50%; flex-shrink: 0;
}
.topbar-back:active { background: var(--bg); }

.scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.inner { max-width: 520px; margin: 0 auto; padding: 1.25rem 1rem 6rem; }

/* ── ボタン ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
  padding: 0 1.25rem; height: 48px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 15px; font-weight: 600;
  border: none; cursor: pointer; transition: opacity .12s, transform .1s;
  white-space: nowrap; flex-shrink: 0;
}
.btn:active { transform: scale(.97); opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.btn-blue    { background: var(--blue); color: #fff; }
.btn-outline { background: var(--surface); color: var(--blue); border: 1.5px solid var(--blue); }
.btn-ghost   { background: transparent; color: var(--sub); border: 1.5px solid var(--border); }
.btn-danger  { background: var(--danger-lt); color: var(--danger); border: 1.5px solid #fecaca; }
.btn-sm      { height: 36px; padding: 0 .9rem; font-size: 13px; border-radius: 6px; }

/* ── カードブロック（編集） ── */
.card-block {
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 1rem;
  border-left: 4px solid transparent; transition: border-color .2s; overflow: hidden;
}
.card-block:focus-within { border-left-color: var(--blue); }
.block-header { display: flex; align-items: center; padding: .75rem 1rem .5rem; }
.block-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--blue); }
.block-label-sub { font-size: 11px; color: var(--sub); font-weight: 400; }
.auto-textarea {
  width: 100%; border: none; outline: none; resize: none; background: transparent;
  font-family: inherit; font-size: 15px; color: var(--text);
  line-height: 1.65; padding: .25rem 1rem .75rem; min-height: 80px;
  field-sizing: content;
}
.auto-textarea::placeholder { color: var(--sub); opacity: .7; }
.block-actions {
  display: flex; gap: .5rem; padding: .5rem 1rem .9rem;
  border-top: 1px solid var(--border);
}
.block-action-btn {
  display: inline-flex; align-items: center; gap: .35rem;
  padding: .4rem .8rem; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--blue-lt); color: var(--blue); border: none;
}
.block-action-btn:active { background: #dbeafe; }
.img-strip { display: flex; flex-wrap: wrap; gap: .5rem; padding: 0 1rem .75rem; }
.img-thumb {
  position: relative; width: 72px; height: 72px;
  border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
}
.img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.img-thumb-del {
  position: absolute; top: 2px; right: 2px; width: 20px; height: 20px;
  border-radius: 50%; background: rgba(0,0,0,.55); color: #fff;
  border: none; cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
}

/* ── 新規作成 ── */
.welcome-wrap {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; padding: 2rem 1.5rem; text-align: center;
}
.welcome-icon  { font-size: 3.5rem; margin-bottom: 1rem; }
.welcome-title { font-size: 24px; font-weight: 800; margin-bottom: .5rem; letter-spacing: -.02em; }
.welcome-sub   { font-size: 14px; color: var(--sub); margin-bottom: 2rem; line-height: 1.6; }
.set-name-input {
  width: 100%; max-width: 360px; padding: 14px 16px;
  border: 2px solid var(--border); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 16px; color: var(--text);
  background: var(--surface); outline: none; transition: border-color .15s; margin-bottom: 1rem;
}
.set-name-input:focus { border-color: var(--blue); }
#new-subject:focus { border-color: var(--blue); background: var(--surface); }

/* ── 編集画面下部バー ── */
.editor-counter { font-size: 12px; color: var(--sub); font-weight: 600; }
.editor-actions {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: .75rem 1rem env(safe-area-inset-bottom, 0);
  display: flex; gap: .5rem; z-index: 100;
}
.editor-actions .btn { flex: 1; }

/* ── デッキ一覧 ── */
.deck-grid { display: flex; flex-direction: column; gap: .9rem; }
.deck-card {
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 1rem 1rem 1rem 1.1rem;
  display: flex; align-items: center; gap: .75rem;
}
.deck-card-info { flex: 1; min-width: 0; }
.deck-card-title {
  font-size: 16px; font-weight: 700; margin-bottom: .25rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.deck-card-meta { font-size: 13px; color: var(--sub); display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
.deck-card-actions { display: flex; gap: .5rem; flex-shrink: 0; align-items: center; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; flex-shrink: 0;
}
.icon-btn:active { background: var(--border); }

/* ── 公開バッジ ── */
.pub-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 700; padding: 2px 8px;
  border-radius: 20px; white-space: nowrap;
}
.pub-badge.published {
  background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
}
.pub-badge.local {
  background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1;
}

.add-deck-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 26px; cursor: pointer; box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: center;
  position: fixed; bottom: calc(1.5rem + env(safe-area-inset-bottom, 0)); right: 1.25rem;
  z-index: 100; transition: transform .15s;
}
.add-deck-btn:active { transform: scale(.93); }
.empty-state { text-align: center; padding: 4rem 1.5rem; color: var(--sub); font-size: 14px; }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

/* ── 学習画面（上下分割） ── */
#screen-study { overflow: hidden; }

.study-top {
  flex: 1; display: flex; flex-direction: column;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 1rem 1rem .75rem;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  min-height: 0;
}
.study-progress-row {
  display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; flex-shrink: 0;
}
.study-progress-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.study-progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s ease; }
.study-progress-label { font-size: 12px; color: var(--sub); flex-shrink: 0; }

.study-q-tag {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--blue); margin-bottom: .6rem;
}
.study-q-text {
  font-size: 18px; font-weight: 600; line-height: 1.65;
  white-space: pre-wrap; word-break: break-word; flex: 1;
}
.study-q-imgs { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .75rem; }
.study-q-imgs img { height: 80px; border-radius: 6px; object-fit: cover; }

.study-bottom {
  flex-shrink: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
}

/* 「答えを見る」ボタンエリア */
.study-reveal-bar {
  padding: .75rem 1rem;
  display: flex; align-items: center; justify-content: center;
}

/* 解答・解説パネル（スライドアップ） */
.study-answer-panel {
  background: var(--surface);
  border-top: 2px solid var(--blue);
  padding: 1rem;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  max-height: 38vh;
  display: none;
}
.study-answer-panel.show { display: block; animation: slideUp .22s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }

.answer-tag {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--blue); margin-bottom: .5rem;
}
.answer-text {
  font-size: 16px; font-weight: 600; line-height: 1.65;
  white-space: pre-wrap; word-break: break-word; color: var(--text);
}
.answer-imgs { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .75rem; }
.answer-imgs img { height: 72px; border-radius: 6px; object-fit: cover; }
.expl-divider { border: none; border-top: 1px solid var(--border); margin: .75rem 0; }
.expl-tag {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--sub); margin-bottom: .4rem;
}
.expl-text { font-size: 14px; color: var(--sub); line-height: 1.65; white-space: pre-wrap; word-break: break-word; }

.study-nav {
  display: flex; gap: .5rem;
  padding: .6rem 1rem calc(.6rem + env(safe-area-inset-bottom, 0));
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.study-nav .btn { flex: 1; }

.study-done {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem; text-align: center; gap: 1rem;
}
.study-done-icon  { font-size: 3.5rem; }
.study-done-title { font-size: 22px; font-weight: 800; }
.study-done-sub   { font-size: 14px; color: var(--sub); }

/* ── 作成済みリスト ── */
.created-section { margin-top: 1.5rem; }
.created-label {
  font-size: 11px; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; color: var(--sub); margin-bottom: .75rem;
}
.created-list { display: flex; flex-direction: column; gap: .6rem; }
.created-item {
  background: var(--surface); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: .75rem 1rem;
  display: flex; align-items: flex-start; gap: .75rem;
}
.created-item-num {
  font-size: 11px; font-weight: 700; color: var(--blue);
  background: var(--blue-lt); width: 24px; height: 24px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.created-item-body { flex: 1; min-width: 0; }
.created-item-q { font-size: 13px; font-weight: 600; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.created-item-a { font-size: 12px; color: var(--sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.created-item-btns { display: flex; gap: .35rem; flex-shrink: 0; }

/* ── モーダル ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 300; display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; animation: fadeIn .15s ease; }
@keyframes fadeIn { from { opacity: 0; } }
@media (min-width: 520px) { .modal-overlay { align-items: center; } }

.modal-sheet {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%; padding: 1rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0));
  box-shadow: 0 -8px 40px rgba(0,0,0,.15);
  animation: sheetUp .22s ease;
}
@keyframes sheetUp { from { transform: translateY(30px); opacity: 0; } }
@media (min-width: 520px) {
  .modal-sheet { border-radius: var(--radius); max-width: 420px; margin: 1rem; padding-bottom: 1.5rem; animation: none; }
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto .9rem; }
@media (min-width: 520px) { .modal-handle { display: none; } }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 1rem; }
.modal-input {
  width: 100%; padding: 12px 14px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 16px;
  color: var(--text); background: var(--bg); outline: none;
  margin-bottom: 1rem; transition: border-color .15s;
}
.modal-input:focus { border-color: var(--blue); background: var(--surface); }
.modal-btns { display: flex; gap: .5rem; }
.modal-btns .btn { flex: 1; }

/* メニューシート */
.menu-item {
  display: flex; align-items: center; gap: .9rem;
  padding: .9rem .25rem; border-bottom: 1px solid var(--border);
  font-size: 15px; font-weight: 500; cursor: pointer; color: var(--text);
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: var(--bg); border-radius: var(--radius-sm); }
.menu-item.danger { color: var(--danger); }
.menu-icon { font-size: 20px; width: 28px; text-align: center; }

@keyframes spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) {
  .study-answer-panel, .modal-sheet { animation: none; }
}

/* ── わからないボタン（灰色=わかってる / 黄色=わからない） ── */
.unsure-btn {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .4rem .9rem; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--sub);
  transition: all .15s; flex-shrink: 0;
}
/* わからない状態（marked = 黄色） */
.unsure-btn.marked {
  background: #fffbeb; color: #b45309; border-color: #fcd34d;
}
/* わかってる状態（unmarked = 灰色）はデフォルトのまま */

/* わからないバッジ（デッキ一覧） */
.unsure-badge {
  display: inline-flex; align-items: center;
  font-size: 10px; background: #fffbeb; color: #b45309;
  border: 1px solid #fcd34d; padding: 1px 7px; border-radius: 20px; font-weight: 700;
}

/* プレイモード選択モーダル */
.play-mode-item {
  display: flex; align-items: center; gap: .9rem;
  padding: 1rem .25rem; border-bottom: 1px solid var(--border);
  font-size: 15px; font-weight: 500; cursor: pointer; color: var(--text);
  border-radius: var(--radius-sm);
}
.play-mode-item:last-child { border-bottom: none; }
.play-mode-item:active { background: var(--bg); }
.play-mode-icon { font-size: 22px; width: 32px; text-align: center; }
.play-mode-sub  { font-size: 12px; color: var(--sub); margin-top: 2px; }
</style>
</head>
<body>

<!-- ══════════ デッキ一覧 ══════════ -->
<div class="screen active" id="screen-list">
  <div class="topbar">
    <div class="topbar-title">📇 CardMaker</div>
  </div>
  <div class="scroll-body">
    <div class="inner">
      <div id="save-ok-banner" style="display:none;background:#dcfce7;color:#166534;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:600;margin-bottom:1rem;text-align:center">✓ 保存しました！</div>
      <div id="deck-list-empty" class="empty-state">
        <div class="empty-icon">📭</div>
        <div>まだデッキがありません</div>
        <div style="margin-top:.5rem;font-size:13px">右下の ＋ からデッキを作成</div>
      </div>
      <div class="deck-grid" id="deck-grid" style="display:none"></div>
    </div>
  </div>
  <button class="add-deck-btn" onclick="openNewSet()" aria-label="デッキ作成">＋</button>
</div>

<!-- ══════════ セット名入力 ══════════ -->
<div class="screen" id="screen-new">
  <div class="topbar">
    <button class="topbar-back" onclick="showScreen('list')">←</button>
    <div class="topbar-title">新しいデッキ</div>
  </div>
  <div class="scroll-body">
    <div class="welcome-wrap">
      <div class="welcome-icon">✍️</div>
      <div class="welcome-title">新しいデッキを作成</div>
      <div class="welcome-sub">科目を選んでセット名を入力してください。</div>
      <select id="new-subject" style="width:100%;max-width:360px;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:16px;color:var(--text);background:var(--surface);outline:none;-webkit-appearance:none;margin-bottom:.75rem;transition:border-color .15s">
        <option value="">科目を選択（任意）</option>
      </select>
      <input class="set-name-input" id="new-set-name" type="text"
             placeholder="セット名を入力" maxlength="60"
             onkeydown="if(event.key==='Enter')startEdit()">
      <button class="btn btn-blue" style="width:100%;max-width:360px" onclick="startEdit()">作成 →</button>
    </div>
  </div>
</div>

<!-- ══════════ カード編集 ══════════ -->
<div class="screen" id="screen-edit">
  <div class="topbar">
    <button class="topbar-back" onclick="confirmLeaveEdit()">←</button>
    <div class="topbar-title" id="edit-deck-title">デッキ名</div>
    <div class="editor-counter" id="edit-counter">0枚</div>
  </div>
  <div class="scroll-body" id="edit-scroll">
    <div class="inner">

      <div class="card-block">
        <div class="block-header">
          <span class="block-label">問題文 <span class="block-label-sub">Question</span></span>
        </div>
        <textarea class="auto-textarea" id="ta-q" placeholder="問題文を入力してください…" oninput="autoResize(this)"></textarea>
        <div class="img-strip" id="imgs-q"></div>
        <div class="block-actions">
          <button class="block-action-btn" onclick="addImage('q')">🖼 画像を追加</button>
        </div>
      </div>

      <div class="card-block">
        <div class="block-header">
          <span class="block-label">解答 <span class="block-label-sub">Answer</span></span>
        </div>
        <textarea class="auto-textarea" id="ta-a" placeholder="解答を入力してください…" oninput="autoResize(this)"></textarea>
        <div class="img-strip" id="imgs-a"></div>
        <div class="block-actions">
          <button class="block-action-btn" onclick="addImage('a')">🖼 画像を追加</button>
        </div>
      </div>

      <div class="card-block">
        <div class="block-header">
          <span class="block-label">解説 <span class="block-label-sub">Explanation</span></span>
        </div>
        <textarea class="auto-textarea" id="ta-e" placeholder="解説（任意）…" oninput="autoResize(this)"></textarea>
        <div class="img-strip" id="imgs-e"></div>
        <div class="block-actions">
          <button class="block-action-btn" onclick="addImage('e')">🖼 画像を追加</button>
        </div>
      </div>

      <div class="created-section" id="created-section" style="display:none">
        <div class="created-label">作成済みカード</div>
        <div class="created-list" id="created-list"></div>
      </div>
    </div>
  </div>
  <div class="editor-actions">
    <button class="btn btn-outline" onclick="saveCard(false)">次へ</button>
    <button class="btn btn-ghost"   onclick="saveCard('local')">保存</button>
    <button class="btn btn-blue" id="btn-done" onclick="saveCard('publish')">保存して公開</button>
  </div>
</div>

<!-- ══════════ 学習画面 ══════════ -->
<div class="screen" id="screen-study">
  <div class="topbar">
    <button class="topbar-back" onclick="showScreen('list')">←</button>
    <div class="topbar-title" id="study-title">学習</div>
    <button class="btn btn-ghost btn-sm" onclick="shuffleStudy()">🔀</button>
  </div>

  <!-- 完了画面 -->
  <div class="study-done" id="study-done" style="display:none">
    <div class="study-done-icon">🎉</div>
    <div class="study-done-title">完了！</div>
    <div class="study-done-sub" id="study-done-sub"></div>
    <button class="btn btn-outline" onclick="shuffleStudy()">もう一度</button>
    <button class="btn btn-blue"    onclick="showScreen('list')">一覧に戻る</button>
  </div>

  <!-- 学習コンテンツ -->
  <div id="study-content" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden">

    <!-- 上半分: 問題文 -->
    <div class="study-top">
      <div class="study-progress-row">
        <div class="study-progress-bar">
          <div class="study-progress-fill" id="study-prog-fill"></div>
        </div>
        <div class="study-progress-label" id="study-prog-label"></div>

      <div class="study-q-imgs" id="study-q-imgs"></div>
    </div>

    <!-- 下半分: 解答・解説 -->
    <div class="study-bottom">
      <!-- 解答パネル（タップ前は非表示） -->

        <div class="answer-tag">解答</div>
        <div class="answer-text" id="study-a-text"></div>
        <div class="answer-imgs" id="study-a-imgs"></div>
        <div id="study-expl-wrap" style="display:none">
          <hr class="expl-divider">
          <div class="expl-tag">解説</div>
          <div class="expl-text" id="study-e-text"></div>

      <!-- 答えを見るボタン / ナビ -->
      <div class="study-reveal-bar" id="study-reveal-bar">
        <button class="btn btn-blue" style="width:100%;max-width:360px" onclick="revealAnswer()">答えを見る</button>

      <div class="study-nav" id="study-nav" style="display:none">
        <button class="btn btn-ghost" id="study-prev" onclick="studyMove(-1)" disabled>← 前へ</button>
        <button class="unsure-btn" id="unsure-btn" onclick="toggleUnsure()">？ わからない</button>
        <button class="btn btn-blue"  id="study-next" onclick="studyMove(1)">次へ →</button>
      </div>
    </div>

  </div>
</div>

<!-- モーダル: プレイモード選択 -->
<div class="modal-overlay" id="modal-play-mode" onclick="onOverlayClick(event,'modal-play-mode')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="play-mode-deck-name" style="font-size:14px;color:var(--sub);font-weight:600;margin-bottom:.75rem"></div>

      </div>

    <div class="play-mode-item" id="play-mode-unsure-item" onclick="startStudyMode('unsure')">
      <span class="play-mode-icon">🔖</span>
      <div>
        <div>わからないカードだけ</div>
        <div class="play-mode-sub" id="play-mode-unsure-sub"></div>

</div>

<!-- モーダル: デッキ名変更 -->
<div class="modal-overlay" id="modal-rename" onclick="onOverlayClick(event,'modal-rename')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">デッキを編集</div>
    <label style="font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:5px">科目</label>
    <select id="modal-rename-subject" class="modal-input" style="margin-bottom:.75rem;-webkit-appearance:none">
      <option value="">読み込み中…</option>
    </select>
    <label style="font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:5px">セット名</label>
    <input class="modal-input" id="modal-rename-input" type="text" placeholder="セット名"
           onkeydown="if(event.key==='Enter')saveRename()">
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('modal-rename')">キャンセル</button>
      <button class="btn btn-blue"  onclick="saveRename()">保存</button>
    </div>
  </div>
</div>

<!-- モーダル: デッキメニュー（鉛筆ボタン） -->
<div class="modal-overlay" id="modal-deck-menu" onclick="onOverlayClick(event,'modal-deck-menu')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="menu-deck-name" style="font-size:14px;color:var(--sub);font-weight:600;margin-bottom:.75rem"></div>
    <div class="menu-item" onclick="menuEdit()">
      <span class="menu-icon">✏️</span>カードを編集する
    </div>
    <div class="menu-item" onclick="menuRename()">
      <span class="menu-icon">📝</span>デッキ名を変更する
    </div>
    <!-- 公開済みのときだけ表示 -->
    <div class="menu-item" id="menu-unpublish-item" onclick="menuUnpublish()" style="display:none">
      <span class="menu-icon">🔴</span>非公開に戻す
    </div>
    <div class="menu-item danger" onclick="menuDelete()">
      <span class="menu-icon">🗑</span>デッキを削除する
    </div>
  </div>
</div>

<!-- モーダル: カード編集 -->
<div class="modal-overlay" id="modal-card-edit" onclick="onOverlayClick(event,'modal-card-edit')">
  <div class="modal-sheet" style="padding-bottom:1.5rem">
    <div class="modal-handle"></div>
    <div class="modal-title">カードを編集</div>
    <div id="card-edit-ok"  style="display:none;background:#dcfce7;color:#166534;border-radius:6px;padding:10px 13px;font-size:13px;margin-bottom:10px">✓ 保存しました！</div>
    <div id="card-edit-err" style="display:none;background:#fee2e2;color:#991b1b;border-radius:6px;padding:10px 13px;font-size:13px;margin-bottom:10px"></div>
    <label style="font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:4px">問題文</label>
    <textarea class="modal-input" id="modal-edit-q" style="min-height:70px;resize:none;margin-bottom:.75rem" oninput="autoResize(this)"></textarea>
    <label style="font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:4px">解答</label>
    <textarea class="modal-input" id="modal-edit-a" style="min-height:70px;resize:none;margin-bottom:.75rem" oninput="autoResize(this)"></textarea>
    <label style="font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:4px">解説（任意）</label>
    <textarea class="modal-input" id="modal-edit-e" style="min-height:60px;resize:none;margin-bottom:1rem" oninput="autoResize(this)"></textarea>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('modal-card-edit')">閉じる</button>
      <button class="btn btn-blue" id="card-edit-save-btn" onclick="saveCardEdit()">保存する</button>
    </div>
  </div>
</div>

<input type="file" id="img-file-input" accept="image/*" style="display:none">

<script>
// ═══════════════════════════════════════════
//  設定
// ═══════════════════════════════════════════
const API_BASE = "https://python-bot-1istudy.onrender.com/";
const GUILD_ID = "1509880344806162544";

const STORE_KEY = 'cardmaker_decks_v1';
function loadDecks() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; } }
function saveDecks(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

let decks = loadDecks();
let currentDeckId  = null;
let editingCardIdx = null;
let menuTargetId   = null;
let imgBuf = { q:[], a:[], e:[] };
let studyCards = [], studyIdx = 0;

// ── ルーター ──────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'list') {
    decks = loadDecks();
    renderDeckListUI();
    setTimeout(() => renderDeckList(), 0);
  }
}

// ── デッキ一覧 ────────────────────────
function renderDeckListUI() {
  const grid  = document.getElementById('deck-grid');
  const empty = document.getElementById('deck-list-empty');
  if (!decks.length) { grid.style.display='none'; empty.style.display='block'; return; }
  empty.style.display='none'; grid.style.display='flex';
  grid.innerHTML = decks.map(d => {
    const unsureSet = getUnsureSet(d.id);
    const unsureCount = d.cards.filter((c, i) => unsureSet.has(c.id || ('idx_' + i))).length;
    const unsureBadge = unsureCount > 0
      ? `<span class="unsure-badge">🔖 ${unsureCount}</span>`
      : '';
    // 公開バッジ
    const pubBadge = d.filename
      ? `<span class="pub-badge published">🔵 公開済み</span>`
      : `<span class="pub-badge local">🔴 非公開</span>`;
    return `
    <div class="deck-card">
      <div class="deck-card-info">
        <div class="deck-card-title">${esc(d.name)}</div>
        <div class="deck-card-meta">
          ${d.filename ? (d.count ?? d.cards.length) : d.cards.length} 問
          ${pubBadge}
          ${unsureBadge}
        </div>
      </div>
      <div class="deck-card-actions">
        <button class="btn btn-blue btn-sm" onclick="openPlayMode('${d.id}')"
          ${d.cards.length===0?'disabled':''}>▶ プレイ</button>
        <button class="icon-btn" onclick="openDeckMenu('${d.id}')" title="メニュー">✏️</button>
      </div>
    </div>`;
  }).join('');
}

async function renderDeckList() {
  decks = loadDecks();
  renderDeckListUI();
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 5000);
    const res  = await fetch(`${API_BASE}list_cards`, { signal: controller.signal });
    clearTimeout(timer);
    const data = await res.json();
    if (!data.ok) return;

    const fetched = data.sets.map(s => {
      const existing = decks.find(d => d.filename === s.filename);
      return {
        id:       existing ? existing.id : genId(),
        name:     s.name,
        cards:    s.cards,
        filename: s.filename,
        count:    s.count,
      };
    });

    const publishedNames = new Set(fetched.map(f => f.name));
    const localOnly = decks.filter(d => !d.filename && !publishedNames.has(d.name));
    decks = [...localOnly, ...fetched];
    saveDecks(decks);
    renderDeckListUI();
  } catch(e) {}
}

// ── デッキメニュー（鉛筆） ─────────────
function openDeckMenu(id) {
  menuTargetId = id;
  const deck = decks.find(d => d.id === id);
  document.getElementById('menu-deck-name').textContent = deck.name;
  // 公開済みのときだけ「非公開に戻す」を表示
  document.getElementById('menu-unpublish-item').style.display = deck.filename ? '' : 'none';
  openModal('modal-deck-menu');
}
function menuEdit()   { closeModal('modal-deck-menu'); openEditDeck(menuTargetId); }
function menuRename() { closeModal('modal-deck-menu'); openRename(menuTargetId); }

// ── 非公開に戻す ──────────────────────
async function menuUnpublish() {
  closeModal('modal-deck-menu');
  const deck = decks.find(d => d.id === menuTargetId);
  if (!deck || !deck.filename) return;
  if (!confirm(`「${deck.name}」をGitHubから削除して非公開に戻しますか？`)) return;

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const res = await fetch(`${API_BASE}delete_cards`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ filename: deck.filename }),
      signal:  controller.signal,
    });
    clearTimeout(timer);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '削除失敗');

    // ローカルのfilenameを消してローカルのみの状態に
    deck.filename = null;
    deck.count    = undefined;
    saveDecks(decks);
    renderDeckListUI();

    const banner = document.getElementById('save-ok-banner');
    banner.textContent = '🔴 非公開に戻しました';
    banner.style.background = '#f1f5f9';
    banner.style.color = '#334155';
    banner.style.display = 'block';
    setTimeout(() => {
      banner.style.display = 'none';
      banner.style.background = '#dcfce7';
      banner.style.color = '#166534';
    }, 3000);

  } catch(e) {
    alert('GitHubからの削除に失敗しました。しばらく後に再試行してください。\n' + e.message);
  }
}

async function menuDelete() {
  closeModal('modal-deck-menu');
  if (!confirm('このデッキを削除しますか？')) return;
  const deck = decks.find(d => d.id === menuTargetId);

  if (deck && deck.filename) {
    try {
      await fetch(`${API_BASE}delete_cards`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ filename: deck.filename }),
      });
    } catch(e) {
      if (!confirm('GitHubからの削除に失敗しました。ローカルからだけ削除しますか？')) return;
    }
  }

  decks = decks.filter(d => d.id !== menuTargetId);
  saveDecks(decks); renderDeckList();
}

// ── 新規作成 ──────────────────────────
function openNewSet() {
  document.getElementById('new-set-name').value = '';
  showScreen('new');
  loadSubjects();
  setTimeout(() => document.getElementById('new-set-name').focus(), 200);
}

async function loadSubjects() {
  const sel = document.getElementById('new-subject');
  sel.innerHTML = '<option value="">読み込み中…</option>';
  try {
    const res  = await fetch(`${API_BASE}channels?guild_id=${GUILD_ID}`);
    const data = await res.json();
    if (!data.ok || !data.channels.length) throw new Error();
    sel.innerHTML = '<option value="">科目を選択（任意）</option>' +
      data.channels.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  } catch(e) {
    sel.innerHTML = '<option value="">（科目を取得できませんでした）</option>';
  }
}
function startEdit() {
  const subject = document.getElementById('new-subject').value;
  const input   = document.getElementById('new-set-name').value.trim();
  if (!input) { shake('new-set-name'); return; }
  const name = subject ? `${subject} ${input}` : input;
  const deck = { id: genId(), name, subject, cards: [] };
  decks.push(deck); saveDecks(decks);
  openEditDeck(deck.id);
}

// ── カード編集画面 ────────────────────
function openEditDeck(deckId) {
  currentDeckId = deckId;
  const deck = decks.find(d => d.id === deckId);
  document.getElementById('edit-deck-title').textContent = deck.name;
  clearEditor(); renderCreatedList(); showScreen('edit');
  setTimeout(() => document.getElementById('ta-q').focus(), 200);
}
function clearEditor() {
  ['q','a','e'].forEach(k => {
    document.getElementById('ta-'+k).value = '';
    autoResize(document.getElementById('ta-'+k));
    imgBuf[k] = [];
    document.getElementById('imgs-'+k).innerHTML = '';
  });
}
function saveCard(mode) {
  const q = document.getElementById('ta-q').value.trim();
  const a = document.getElementById('ta-a').value.trim();
  const deck = decks.find(d => d.id === currentDeckId);

  if (q || a) {
    if (!q || !a) { shake(!q ? 'ta-q' : 'ta-a'); return; }
    deck.cards.push({ id:genId(), question:q, answer:a,
      explanation: document.getElementById('ta-e').value.trim(),
      imgs_q:[...imgBuf.q], imgs_a:[...imgBuf.a], imgs_e:[...imgBuf.e] });
    saveDecks(decks);
    document.getElementById('edit-counter').textContent = deck.cards.length + '枚';
  }

  if (mode === 'publish') {
    publishDeck(deck);
  } else if (mode === 'local') {
    saveDecks(decks);
    showScreen('list');
  } else {
    clearEditor(); renderCreatedList(); document.getElementById('edit-scroll').scrollTo(0,0); document.getElementById('ta-q').focus();
  }
}

async function publishDeck(deck) {
  saveDecks(decks);
  showScreen('list');

  const cards = deck.cards.map(c => ({
    question:    c.question,
    answer:      c.answer,
    explanation: c.explanation || '',
  }));
  const body = { name: deck.name, cards };
  if (deck.filename) body.filename = deck.filename;

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 10000);
    const res  = await fetch(`${API_BASE}save_cards`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
      signal:  controller.signal,
    });
    clearTimeout(timer);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '不明なエラー');

    deck.filename = data.filename;
    deck.count    = deck.cards.length;
    saveDecks(decks);
    renderDeckListUI();

    const banner = document.getElementById('save-ok-banner');
    banner.textContent = '✓ 保存して公開しました！';
    banner.style.background = '#dcfce7';
    banner.style.color = '#166534';
    banner.style.display = 'block';
    setTimeout(() => banner.style.display = 'none', 3000);

  } catch(e) {
    const banner = document.getElementById('save-ok-banner');
    banner.textContent = '💾 ローカルに保存しました（GitHub同期失敗）';
    banner.style.background = '#fffbeb';
    banner.style.color = '#92400e';
    banner.style.display = 'block';
    setTimeout(() => {
      banner.style.display = 'none';
      banner.textContent = '✓ 保存しました！';
      banner.style.background = '#dcfce7';
      banner.style.color = '#166534';
    }, 4000);
  }
}

function renderCreatedList() {
  const deck = decks.find(d => d.id === currentDeckId);
  const section = document.getElementById('created-section');
  const list    = document.getElementById('created-list');
  if (!deck||!deck.cards.length) { section.style.display='none'; return; }
  section.style.display='block';
  list.innerHTML = deck.cards.map((c,i) => `
    <div class="created-item">
      <div class="created-item-num">${i+1}</div>
      <div class="created-item-body">
        <div class="created-item-q">${esc(c.question)}</div>
        <div class="created-item-a">${esc(c.answer)}</div>
      </div>
      <div class="created-item-btns">
        <button class="btn btn-ghost btn-sm" onclick="openCardEditModal(${i})">編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCardFromDeck(${i})">削除</button>
      </div>
    </div>`).join('');
}
function deleteCardFromDeck(idx) {
  if (!confirm('このカードを削除しますか？')) return;
  const deck = decks.find(d => d.id === currentDeckId);
  deck.cards.splice(idx, 1); saveDecks(decks);
  document.getElementById('edit-counter').textContent = deck.cards.length + '枚';
  renderCreatedList();
}
function confirmLeaveEdit() {
  if (confirm('編集を終了して一覧に戻りますか？')) showScreen('list');
}

// ── カード編集モーダル ─────────────────
function openCardEditModal(idx) {
  const deck = decks.find(d => d.id === currentDeckId);
  const c = deck.cards[idx];
  editingCardIdx = idx;
  document.getElementById('modal-edit-q').value = c.question;
  document.getElementById('modal-edit-a').value = c.answer;
  document.getElementById('modal-edit-e').value = c.explanation||'';
  ['modal-edit-q','modal-edit-a','modal-edit-e'].forEach(id => autoResize(document.getElementById(id)));
  document.getElementById('card-edit-ok').style.display  = 'none';
  document.getElementById('card-edit-err').style.display = 'none';
  openModal('modal-card-edit');
}
function saveCardEdit() {
  const q = document.getElementById('modal-edit-q').value.trim();
  const a = document.getElementById('modal-edit-a').value.trim();
  const errBar = document.getElementById('card-edit-err');
  if (!q || !a) {
    errBar.textContent = '✕ 問題文と解答は必須です';
    errBar.style.display = 'block';
    setTimeout(() => errBar.style.display = 'none', 3000);
    return;
  }
  const deck = decks.find(d => d.id === currentDeckId);
  deck.cards[editingCardIdx] = {
    ...deck.cards[editingCardIdx],
    question: q, answer: a,
    explanation: document.getElementById('modal-edit-e').value.trim()
  };
  saveDecks(decks);
  closeModal('modal-card-edit');
  renderCreatedList();
}

// ── デッキ名変更 ──────────────────────
let renamingDeckId = null;
async function openRename(id) {
  renamingDeckId = id;
  const deck = decks.find(d => d.id === id);

  const currentSubject = deck.subject || '';
  const currentName = currentSubject && deck.name.startsWith(currentSubject + ' ')
    ? deck.name.slice(currentSubject.length + 1)
    : deck.name;
  document.getElementById('modal-rename-input').value = currentName;

  const sel = document.getElementById('modal-rename-subject');
  sel.innerHTML = '<option value="">読み込み中…</option>';
  openModal('modal-rename');

  try {
    const res  = await fetch(`${API_BASE}channels?guild_id=${GUILD_ID}`);
    const data = await res.json();
    if (!data.ok || !data.channels.length) throw new Error();
    sel.innerHTML = '<option value="">科目なし</option>' +
      data.channels.map(c =>
        `<option value="${c.name}"${c.name === currentSubject ? ' selected' : ''}>${c.name}</option>`
      ).join('');
  } catch(e) {
    sel.innerHTML = `<option value="${currentSubject}">${currentSubject || '（取得失敗）'}</option>`;
  }

  setTimeout(() => document.getElementById('modal-rename-input').focus(), 150);
}
function saveRename() {
  const subject = document.getElementById('modal-rename-subject').value;
  const input   = document.getElementById('modal-rename-input').value.trim();
  if (!input) return;
  const deck = decks.find(d => d.id === renamingDeckId);
  deck.subject = subject;
  deck.name    = subject ? `${subject} ${input}` : input;
  saveDecks(decks);
  closeModal('modal-rename');
  renderDeckListUI();
}

// ── 学習 ─────────────────────────────
function getUnsureSet(deckId) {
  try {
    const raw = localStorage.getItem('unsure_' + deckId);
    return new Set(raw ? JSON.parse(raw) : []);
  } catch { return new Set(); }
}
function saveUnsureSet(deckId, set) {
  localStorage.setItem('unsure_' + deckId, JSON.stringify([...set]));
}

let studyDeckId = null;

function openPlayMode(deckId) {
  const deck = decks.find(d => d.id === deckId);
  studyDeckId = deckId;
  document.getElementById('play-mode-deck-name').textContent = deck.name;
  document.getElementById('play-mode-all-sub').textContent = `${deck.cards.length} 問`;

  const unsure = getUnsureSet(deckId);
  const unsureCount = deck.cards.filter((c, i) => unsure.has(c.id || ('idx_' + i))).length;
  const unsureItem = document.getElementById('play-mode-unsure-item');

  if (unsureCount > 0) {
    document.getElementById('play-mode-unsure-sub').textContent = `${unsureCount} 問`;
    unsureItem.style.display = '';
  } else {
    startStudyMode('all');
    return;
  }
  openModal('modal-play-mode');
}

function startStudyMode(mode) {
  closeModal('modal-play-mode');
  const deck = decks.find(d => d.id === studyDeckId);
  if (mode === 'unsure') {
    const unsure = getUnsureSet(studyDeckId);
    studyCards = deck.cards.filter((c, i) => unsure.has(c.id || ('idx_' + i)));
  } else {
    studyCards = [...deck.cards];
  }
  studyIdx = 0;
  document.getElementById('study-title').textContent = deck.name;
  document.getElementById('study-done-sub').textContent = `全 ${studyCards.length} 問完了！`;
  showScreen('study');
  document.getElementById('study-done').style.display    = 'none';
  document.getElementById('study-content').style.display = 'flex';
  renderStudyCard();
}

function startStudy(deckId) {
  studyDeckId = deckId;
  openPlayMode(deckId);
}

function renderStudyCard() {
  if (studyIdx >= studyCards.length) {
    document.getElementById('study-content').style.display = 'none';
    document.getElementById('study-done').style.display    = 'flex';
    document.getElementById('study-prog-fill').style.width    = '100%';
    document.getElementById('study-prog-label').textContent   = `${studyCards.length} / ${studyCards.length}`;
    return;
  }
  const c = studyCards[studyIdx];

  document.getElementById('study-q-text').textContent = c.question;
  document.getElementById('study-q-imgs').innerHTML = (c.imgs_q||[]).map(s=>`<img src="${s}" alt="">`).join('');

  document.getElementById('study-answer-panel').classList.remove('show');
  document.getElementById('study-reveal-bar').style.display = '';
  document.getElementById('study-nav').style.display = 'none';

  document.getElementById('study-a-text').textContent = c.answer;
  document.getElementById('study-a-imgs').innerHTML = (c.imgs_a||[]).map(s=>`<img src="${s}" alt="">`).join('');
  const explWrap = document.getElementById('study-expl-wrap');
  if (c.explanation) {
    document.getElementById('study-e-text').textContent = c.explanation;
    explWrap.style.display = '';
  } else { explWrap.style.display = 'none'; }

  const pct = studyCards.length > 1 ? (studyIdx/(studyCards.length-1))*100 : 100;
  document.getElementById('study-prog-fill').style.width  = pct + '%';
  document.getElementById('study-prog-label').textContent = `${studyIdx+1} / ${studyCards.length}`;
  document.getElementById('study-prev').disabled = studyIdx === 0;
  document.getElementById('study-next').textContent = studyIdx === studyCards.length-1 ? '完了 ✓' : '次へ →';

  updateUnsureBtn();
}

function revealAnswer() {
  document.getElementById('study-answer-panel').classList.add('show');
  document.getElementById('study-reveal-bar').style.display = 'none';
  document.getElementById('study-nav').style.display = '';
  updateUnsureBtn();
}

function updateUnsureBtn() {
  const card = studyCards[studyIdx];
  if (!card) return;
  // idがないカードはindexをキーにする
  const key = card.id || ('idx_' + studyIdx);
  const unsure = getUnsureSet(studyDeckId);
  const marked = unsure.has(key);
  const btn = document.getElementById('unsure-btn');
  btn.textContent = 'わからない';
  btn.classList.toggle('marked', marked);
}

function toggleUnsure() {
  const card = studyCards[studyIdx];
  if (!card) return;
  const key = card.id || ('idx_' + studyIdx);
  const unsure = getUnsureSet(studyDeckId);
  if (unsure.has(key)) {
    unsure.delete(key);
  } else {
    unsure.add(key);
  }
  saveUnsureSet(studyDeckId, unsure);
  updateUnsureBtn();
}

function studyMove(dir) {
  studyIdx += dir;
  renderStudyCard();
}

function shuffleStudy() {
  for (let i=studyCards.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [studyCards[i],studyCards[j]]=[studyCards[j],studyCards[i]];
  }
  studyIdx = 0;
  document.getElementById('study-done').style.display    = 'none';
  document.getElementById('study-content').style.display = 'flex';
  renderStudyCard();
}

// キーボード
document.addEventListener('keydown', e => {
  if (document.querySelector('.screen.active')?.id !== 'screen-study') return;
  if (e.key==='ArrowRight') studyMove(1);
  if (e.key==='ArrowLeft' && studyIdx>0) studyMove(-1);
  if (e.key===' ') { e.preventDefault(); revealAnswer(); }
});

// ── 画像 ──────────────────────────────
let imgTarget = null;
const imgInput = document.getElementById('img-file-input');
function addImage(t) { imgTarget=t; imgInput.click(); }
imgInput.addEventListener('change', () => {
  const file = imgInput.files[0]; if (!file||!imgTarget) return;
  const r = new FileReader();
  r.onload = e => { imgBuf[imgTarget].push(e.target.result); renderImgStrip(imgTarget); };
  r.readAsDataURL(file); imgInput.value='';
});
function renderImgStrip(k) {
  document.getElementById('imgs-'+k).innerHTML = imgBuf[k].map((b,i)=>`
    <div class="img-thumb"><img src="${b}" alt="">
      <button class="img-thumb-del" onclick="removeImg('${k}',${i})">✕</button></div>`).join('');
}
function removeImg(k,i) { imgBuf[k].splice(i,1); renderImgStrip(k); }

// ── モーダル ──────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function onOverlayClick(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }

// ── ユーティリティ ────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function autoResize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function shake(id) {
  const el=document.getElementById(id); el.style.borderColor='#EF4444'; el.focus();
  setTimeout(()=>el.style.borderColor='',700);
}

renderDeckList();
</script>
</body>
