<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>1I勉強会web</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f9f9f8;
  --surface: #ffffff;
  --border: #e5e5e3;
  --border-light: #f0f0ee;
  --text: #1a1a18;
  --text-secondary: #6b6b68;
  --text-tertiary: #b0b0ac;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 14px;
  --shadow: 0 1px 4px rgba(0,0,0,.07);

  /* 曜日カラー */
  --mon: #dbeafe; --mon-t: #1e40af;
  --tue: #fce7f3; --tue-t: #9d174d;
  --wed: #dcfce7; --wed-t: #166534;
  --thu: #ffedd5; --thu-t: #9a3412;
  --fri: #fef9c3; --fri-t: #854d0e;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* 時間割編集モード切り替えタブ */
.tt-edit-mode-tabs {
  display: flex;
  gap: 6px;
}
.tt-mode-btn {
  flex: 1;
  padding: 9px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--bg);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all .15s;
}
.tt-mode-btn.active {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
}

/* 上書きリスト行 */
.override-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 10px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  margin-bottom: 6px;
  background: var(--surface);
}
.override-date    { font-size: 11px; color: var(--text-secondary); min-width: 70px; }
.override-info    { font-size: 13px; flex: 1; }
.override-del-btn {
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 15px;
  padding: 2px 5px;
  border-radius: var(--r-sm);
}
.override-del-btn:active { background: var(--bg); }
.override-badge-holiday { background: #fee2e2; color: #991b1b; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
.override-badge-change  { background: #dbeafe; color: #1e40af; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

.drawer-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.32);
  z-index: 300;
}
.drawer-overlay.open { display: block; }

.drawer {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 310;
  transform: translateX(-100%);
  transition: transform .22s ease;
  display: flex;
  flex-direction: column;
  padding: 0;
}
.drawer.open { transform: translateX(0); }

.drawer-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border-light);
}
.drawer-header .app-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -.01em;
}
.drawer-header .app-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.drawer-nav {
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}
.drawer-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 12px;
  border-radius: var(--r-md);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  transition: background .13s, color .13s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.drawer-item .di-icon { font-size: 17px; flex-shrink: 0; }
.drawer-item:hover { background: var(--bg); }
.drawer-item.active {
  background: #dbeafe;
  color: #1e40af;
}

/* ============================
   ヘッダー
============================ */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1rem;
  display: flex;
  align-items: center;
  height: 54px;
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 10px;
}
.menu-btn {
  background: none;
  border: none;
  padding: 6px 8px;
  cursor: pointer;
  font-size: 20px;
  color: var(--text-secondary);
  line-height: 1;
  border-radius: var(--r-sm);
  flex-shrink: 0;
}
.menu-btn:active { background: var(--bg); }

.header-title {
  font-size: 16px;
  font-weight: 700;
  flex: 1;
}

/* 予定管理のタブ */
.view-toggle {
  display: flex;
  background: var(--bg);
  border-radius: var(--r-md);
  padding: 3px;
  gap: 2px;
  border: 1px solid var(--border);
}
.view-btn {
  padding: 5px 13px;
  font-size: 12px;
  border: none;
  background: none;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--text-secondary);
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
  font-weight: 500;
}
.view-btn.active {
  background: var(--surface);
  color: var(--text);
  font-weight: 600;
  box-shadow: var(--shadow);
}

/* 時間割の週ナビ */
.week-nav {
  display: flex;
  align-items: center;
  gap: 4px;
}
.week-nav button {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 5px 9px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-secondary);
  line-height: 1;
  font-weight: 500;
}
.week-nav button:active { background: var(--border); }
.week-nav .today-btn {
  background: #dbeafe;
  color: #1e40af;
  border-color: #bfdbfe;
  font-size: 12px;
  font-weight: 700;
}
.week-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  min-width: 82px;
  text-align: center;
}

/* ============================
   ビュー切り替え
============================ */
.view-root { display: none; }
.view-root.active { display: block; }

/* ============================
   予定管理
============================ */
.plan-main { max-width: 640px; margin: 0 auto; padding: 1.1rem 1rem 7rem; }

.plan-sub-view { display: none; }
.plan-sub-view.active { display: block; }

.badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.badge-宿題  { background: #ffedd5; color: #9a3412; }
.badge-提出  { background: #ffedd5; color: #9a3412; }
.badge-持ち物 { background: #dcfce7; color: #166534; }
.badge-テスト { background: #fee2e2; color: #991b1b; }
.badge-その他 { background: #f3f4f6; color: #374151; }
.badge-連絡  { background: #dbeafe; color: #1e40af; }

.date-group { margin-bottom: 1.1rem; }
.date-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); letter-spacing: .07em; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.today-tag  { font-size: 10px; background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 20px; font-weight: 700; letter-spacing: 0; }
.date-card  { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.plan-row   { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border-light); }
.plan-row:last-child { border-bottom: none; }
.plan-row .subject  { font-size: 14px; font-weight: 600; min-width: 52px; }
.plan-row .content  { font-size: 13px; color: var(--text-secondary); flex: 1; }

/* ログ */
.timeline { padding-left: 26px; position: relative; }
.timeline::before { content: ''; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 1.5px; background: var(--border); }
.tl-item  { position: relative; margin-bottom: 1.1rem; }
.tl-dot   { position: absolute; left: -21px; top: 4px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); }
.dot-add { background: #166534; } .dot-edit { background: #1e40af; }
.dot-delete { background: #991b1b; } .dot-cleanup { background: #6b7280; }
.tl-time  { font-size: 11px; color: var(--text-tertiary); margin-bottom: 3px; }
.tl-card  { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 10px 13px; }
.tl-type  { font-size: 11px; font-weight: 700; letter-spacing: .05em; margin-bottom: 3px; }
.type-add { color: #166534; } .type-edit { color: #1e40af; }
.type-delete { color: #991b1b; } .type-cleanup { color: #6b7280; }
.tl-detail { font-size: 13px; color: var(--text-secondary); line-height: 1.5; word-break: break-all; }

/* FAB */
.fab-wrap { position: fixed; bottom: 1.5rem; right: 1.25rem; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; z-index: 100; }
.fab-overlay { display: none; position: fixed; inset: 0; z-index: 99; }
.fab-overlay.open { display: block; }
.fab-main { width: 54px; height: 54px; border-radius: 50%; background: var(--text); color: #fff; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .2s; box-shadow: 0 3px 14px rgba(0,0,0,.22); }
.fab-main.open { transform: rotate(45deg); }
.fab-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 9px; opacity: 0; pointer-events: none; transform: translateY(10px); transition: opacity .18s, transform .18s; }
.fab-actions.open { opacity: 1; pointer-events: all; transform: translateY(0); }
.fab-action { display: flex; align-items: center; gap: 9px; cursor: pointer; }
.fab-label  { font-size: 13px; font-weight: 600; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 6px 13px; color: var(--text); box-shadow: var(--shadow); }
.fab-btn    { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }

/* ============================
   時間割
============================ */
.tt-main { max-width: 720px; margin: 0 auto; padding: 1rem 0.75rem 5rem; display: flex; flex-direction: column; gap: 1rem; }

.today-banner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.today-dot { width: 8px; height: 8px; border-radius: 50%; background: #1e40af; flex-shrink: 0; }
.today-banner-text { font-size: 13px; color: var(--text-secondary); }
.today-banner-day  { font-weight: 700; color: var(--text); }

/* 曜日タブ */
.day-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 5px; }
.day-tab {
  flex: 1; padding: 7px 4px;
  border: none; background: none; border-radius: var(--r-md);
  font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-secondary);
  transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 2px;
  position: relative;
}
.day-tab .tab-day  { font-size: 11px; font-weight: 700; }
.day-tab .tab-date { font-size: 10px; font-weight: 400; color: var(--text-tertiary); }
.day-tab.active { color: var(--text); box-shadow: var(--shadow); }
.day-tab.active.d-mon { background: var(--mon); color: var(--mon-t); }
.day-tab.active.d-tue { background: var(--tue); color: var(--tue-t); }
.day-tab.active.d-wed { background: var(--wed); color: var(--wed-t); }
.day-tab.active.d-thu { background: var(--thu); color: var(--thu-t); }
.day-tab.active.d-fri { background: var(--fri); color: var(--fri-t); }
.day-tab.is-today::after {
  content: '';
  position: absolute; top: 4px; right: 4px;
  width: 5px; height: 5px; border-radius: 50%;
  background: #1e40af;
}

/* 時間割カード */
.timetable-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.tt-card-header {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; gap: 8px;
}
.tt-card-header-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.d-mon .tt-card-header-dot { background: var(--mon-t); }
.d-tue .tt-card-header-dot { background: var(--tue-t); }
.d-wed .tt-card-header-dot { background: var(--wed-t); }
.d-thu .tt-card-header-dot { background: var(--thu-t); }
.d-fri .tt-card-header-dot { background: var(--fri-t); }
.tt-card-header-title { font-size: 13px; font-weight: 700; }
.tt-card-header-date  { font-size: 12px; color: var(--text-secondary); margin-left: auto; }

.period-row {
  display: flex; align-items: flex-start;
  padding: 16px 14px; border-bottom: 1px solid var(--border-light); gap: 10px;
}
.period-row:last-child { border-bottom: none; }
.period-num { font-size: 11px; font-weight: 700; color: var(--text-tertiary); min-width: 16px; margin-top: 2px; text-align: center; }
.period-subject { font-size: 14px; font-weight: 700; min-width: 60px; flex-shrink: 0; }
.period-subject.empty { font-weight: 400; color: var(--text-tertiary); font-size: 13px; }
.period-right { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.items-row { display: flex; flex-wrap: wrap; gap: 4px; }
.item-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); color: var(--text-secondary); }

/* 課題バッジ（時間割内） */
.tt-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.tt-badge-宿題  { background: #ffedd5; color: #9a3412; }
.tt-badge-提出  { background: #fee2e2; color: #991b1b; }
.tt-badge-テスト { background: #fce7f3; color: #9d174d; }
.tt-badge-持ち物 { background: #dcfce7; color: #166534; }
.tt-badge-その他 { background: #f3f4f6; color: #374151; }
.tt-badge-連絡  { background: #dbeafe; color: #1e40af; }
.homework-row { display: flex; align-items: flex-start; gap: 5px; }
.homework-text { font-size: 12px; color: var(--text-secondary); flex: 1; line-height: 1.5; }

/* 課題まとめ */
.section-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
.homework-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.hw-row { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border-light); }
.hw-row:last-child { border-bottom: none; }
.hw-subject { font-size: 13px; font-weight: 700; min-width: 56px; flex-shrink: 0; padding-top: 1px; }
.hw-content { font-size: 13px; color: var(--text-secondary); flex: 1; line-height: 1.5; }
.empty-hw   { text-align: center; padding: 1.5rem; color: var(--text-tertiary); font-size: 13px; }

/* ============================
   共通
============================ */
.loading   { text-align: center; padding: 2.5rem; color: var(--text-tertiary); font-size: 13px; }
.empty-msg { text-align: center; padding: 3rem 1rem; color: var(--text-tertiary); font-size: 14px; }
.error-msg { text-align: center; padding: 1.5rem; color: #991b1b; font-size: 13px; background: #fee2e2; border-radius: var(--r-md); }

/* ============================
   モーダル（予定管理）
============================ */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 200; align-items: flex-end; justify-content: center; }
@media (min-width: 520px) { .modal-bg { align-items: center; } }
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  padding: 1.25rem 1.1rem 2rem;
  width: 100%; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 -4px 32px rgba(0,0,0,.13);
  animation: slideUp .22s ease;
}
@media (min-width: 520px) { .modal { border-radius: var(--r-lg); max-width: 460px; margin: 1rem; padding-bottom: 1.25rem; animation: none; } }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1rem; display: block; }
@media (min-width: 520px) { .modal-handle { display: none; } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
.modal-header h3 { font-size: 17px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 21px; cursor: pointer; color: var(--text-secondary); padding: 4px; line-height: 1; }

.field { margin-bottom: 0.85rem; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
.field input, .field select {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--r-md); font-size: 16px;
  background: var(--bg); color: var(--text); outline: none; -webkit-appearance: none;
}
.field input:focus, .field select:focus { border-color: #888; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-primary { background: var(--text); color: #fff; border: none; border-radius: var(--r-md); padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 6px; }
.btn-danger  { background: none; color: #991b1b; border: 1px solid #fca5a5; border-radius: var(--r-md); padding: 13px; font-size: 15px; cursor: pointer; width: 100%; margin-top: 6px; }
.modal-section-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
.success-bar { background: #dcfce7; color: #166534; border-radius: var(--r-sm); padding: 10px 13px; font-size: 13px; margin-bottom: 12px; display: none; }
.error-bar   { background: #fee2e2; color: #991b1b; border-radius: var(--r-sm); padding: 10px 13px; font-size: 13px; margin-bottom: 12px; display: none; }

.sel-list { max-height: 220px; overflow-y: auto; margin-bottom: 1rem; -webkit-overflow-scrolling: touch; }
.sel-item { display: flex; align-items: center; gap: 9px; padding: 11px 12px; border: 1px solid var(--border); border-radius: var(--r-md); margin-bottom: 6px; cursor: pointer; background: var(--surface); transition: border-color .13s; }
.sel-item:active { background: var(--bg); }
.sel-item.selected { border-color: var(--text); background: var(--bg); }
.sel-item .si-date    { font-size: 11px; color: var(--text-secondary); min-width: 76px; }
.sel-item .si-subject { font-size: 13px; font-weight: 600; min-width: 48px; }
.sel-item .si-content { font-size: 13px; color: var(--text-secondary); flex: 1; }
.del-confirm { background: var(--bg); border-radius: var(--r-md); padding: 13px; margin-top: 4px; display: none; }
.del-confirm p { font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; }
.del-confirm strong { font-size: 14px; color: var(--text); display: block; margin-bottom: 12px; word-break: break-all; line-height: 1.4; }

/* カスタムカレンダー */
.date-wrap    { position: relative; }
.date-display { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--r-md); font-size: 15px; background: var(--bg); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.date-display:active { border-color: #888; }
.cal-pop { display: none; position: absolute; top: calc(100% + 5px); left: 0; z-index: 400; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 12px; width: 260px; box-shadow: 0 6px 24px rgba(0,0,0,.12); }
.cal-pop.open { display: block; }
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cal-head span { font-size: 14px; font-weight: 700; }
.cal-nav-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 6px 10px; border-radius: var(--r-sm); font-size: 18px; }
.cal-nav-btn:active { background: var(--bg); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow  { font-size: 10px; color: var(--text-secondary); text-align: center; padding: 3px 0; font-weight: 600; }
.cal-day  { font-size: 13px; text-align: center; padding: 7px 2px; border-radius: var(--r-sm); cursor: pointer; color: var(--text); }
.cal-day:active:not(.dis):not(.emp) { background: var(--bg); }
.cal-day.tod { font-weight: 700; color: #1e40af; }
.cal-day.sel { background: var(--text); color: #fff !important; font-weight: 700; }
.cal-day.dis { color: var(--text-tertiary); cursor: default; }
.cal-day.emp { cursor: default; }
.cat-wrap { display: flex; flex-direction: column; gap: 6px; }

.btn-primary:disabled, .btn-danger:disabled { opacity: 0.6; cursor: not-allowed; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
.spinner-dark { border-color: rgba(0,0,0,0.2); border-top-color: var(--text); }
</style>
</head>
<body>

<!-- ドロワーオーバーレイ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- ドロワー -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="app-name">📚 学習サポート</div>
    <div class="app-sub">統合学習ツール</div>
  </div>
  <nav class="drawer-nav">
    <button class="drawer-item active" id="menu-plan" onclick="switchApp('plan')">
      <span class="di-icon">📘</span>予定管理
    </button>
    <button class="drawer-item" id="menu-tt" onclick="switchApp('tt')">
      <span class="di-icon">📒</span>時間割
    </button>
  </nav>
</div>

<!-- ヘッダー -->
<header class="header" id="app-header">
  <button class="menu-btn" onclick="openDrawer()">☰</button>
  <span class="header-title" id="header-title">予定管理</span>
  <!-- 予定管理タブ -->
  <div class="view-toggle" id="plan-tabs">
    <button class="view-btn active" onclick="switchPlanView('plan')">予定一覧</button>
    <button class="view-btn" onclick="switchPlanView('log')">ログ</button>
  </div>
  <!-- 時間割週ナビ -->
  <div class="week-nav" id="tt-week-nav" style="display:none">
    <button onclick="moveWeek(-1)">‹</button>
    <span class="week-label" id="week-label">—</span>
    <button onclick="moveWeek(1)">›</button>
    <button class="today-btn" onclick="goToday()">今日</button>
  </div>
</header>

<!-- ===================== 予定管理ビュー ===================== -->
<div class="view-root active" id="view-plan">
  <main class="plan-main">
    <!-- 予定一覧 -->
    <div class="plan-sub-view active" id="plan-sub-plan">
      <div class="loading" id="plan-loading">読み込み中…</div>
      <div id="plan-content"></div>
    </div>
    <!-- ログ -->
    <div class="plan-sub-view" id="plan-sub-log">
      <div class="loading" id="log-loading" style="display:none">読み込み中…</div>
      <div class="timeline" id="log-content"></div>
    </div>
  </main>
</div>

<!-- ===================== 時間割ビュー ===================== -->
<div class="view-root" id="view-tt">
  <main class="tt-main" id="tt-main-content">
  </main>
</div>

<!-- ===================== FAB（予定管理のみ） ===================== -->
<div class="fab-overlay" id="fab-overlay" onclick="closeFab()"></div>
<div class="fab-wrap" id="fab-wrap">
  <div class="fab-actions" id="fab-actions">
    <div class="fab-action" onclick="openModal('add')">
      <span class="fab-label">追加</span><div class="fab-btn">＋</div>
    </div>
    <div class="fab-action" onclick="openModal('edit')">
      <span class="fab-label">編集</span><div class="fab-btn">✎</div>
    </div>
    <div class="fab-action" onclick="openModal('delete')">
      <span class="fab-label">削除</span><div class="fab-btn">✕</div>
    </div>
  </div>
  <button class="fab-main" id="fab-main" onclick="toggleFab()">✎</button>
</div>

<!-- ===================== 追加モーダル ===================== -->
<div class="modal-bg" id="modal-add" onclick="onBgClick(event,'add')">
  <div class="modal">
    <span class="modal-handle"></span>
    <div class="modal-header">
      <h3>予定を追加</h3>
      <button class="modal-close" onclick="closeModal('add')">✕</button>
    </div>
    <div class="success-bar" id="add-ok">✓ 登録しました！</div>
    <div class="error-bar"   id="add-err"></div>
    <div class="row2">
      <div class="field">
        <label>日付</label>
        <div class="date-wrap">
          <div class="date-display" onclick="toggleCal(event,'add')">
            <span id="add-date-text" style="color:var(--text-tertiary);font-size:14px">日付を選択</span>
            <span>📅</span>
          </div>
          <div class="cal-pop" id="cal-add"></div>
        </div>
      </div>
      <div class="field">
        <label>科目</label>
        <select id="add-subject"><option value="">読み込み中…</option></select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>カテゴリ</label>
        <div class="cat-wrap">
          <select id="add-category-sel" onchange="onCatSel('add')">
            <option value="宿題">宿題</option><option value="提出">提出</option><option value="持ち物">持ち物</option><option value="テスト">テスト</option><option value="その他">その他</option><option value="__custom__">自由入力…</option>
          </select>
          <input type="text" id="add-category-inp" placeholder="カテゴリを入力" style="display:none">
        </div>
      </div>
      <div class="field">
        <label>内容</label>
        <input type="text" id="add-content" placeholder="例: p.10 問1〜5">
      </div>
    </div>
    <button class="btn-primary" onclick="submitAdd()">追加する</button>
  </div>
</div>

<!-- ===================== 編集モーダル ===================== -->
<div class="modal-bg" id="modal-edit" onclick="onBgClick(event,'edit')">
  <div class="modal">
    <span class="modal-handle"></span>
    <div class="modal-header">
      <h3>予定を編集</h3>
      <button class="modal-close" onclick="closeModal('edit')">✕</button>
    </div>
    <div class="success-bar" id="edit-ok">✓ 編集しました！</div>
    <div class="error-bar"   id="edit-err"></div>
    <div class="modal-section-label">編集する予定を選択</div>
    <div class="sel-list" id="edit-list"></div>
    <div class="modal-section-label">変更する項目だけ入力</div>
    <div class="row2">
      <div class="field">
        <label>新しい日付</label>
        <div class="date-wrap">
          <div class="date-display" onclick="toggleCal(event,'edit')">
            <span id="edit-date-text" style="color:var(--text-tertiary);font-size:13px">変更しない場合は空欄</span>
            <span>📅</span>
          </div>
          <div class="cal-pop" id="cal-edit"></div>
        </div>
      </div>
      <div class="field">
        <label>新しい科目</label>
        <select id="edit-subject"><option value="">— 変更しない —</option></select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>新しいカテゴリ</label>
        <div class="cat-wrap">
          <select id="edit-category-sel" onchange="onCatSel('edit')">
            <option value="">— 変更しない —</option>
            <option value="宿題">宿題</option><option value="提出">提出</option><option value="持ち物">持ち物</option><option value="テスト">テスト</option><option value="その他">その他</option><option value="__custom__">自由入力…</option>
          </select>
          <input type="text" id="edit-category-inp" placeholder="カテゴリを入力" style="display:none">
        </div>
      </div>
      <div class="field">
        <label>新しい内容</label>
        <input type="text" id="edit-content" placeholder="変更しない場合は空欄">
      </div>
    </div>
    <button class="btn-primary" onclick="submitEdit()">保存する</button>
  </div>
</div>

<!-- ===================== 削除モーダル ===================== -->
<div class="modal-bg" id="modal-delete" onclick="onBgClick(event,'delete')">
  <div class="modal">
    <span class="modal-handle"></span>
    <div class="modal-header">
      <h3>予定を削除</h3>
      <button class="modal-close" onclick="closeModal('delete')">✕</button>
    </div>
    <div class="success-bar" id="del-ok">✓ 削除しました！</div>
    <div class="error-bar"   id="del-err"></div>
    <div class="modal-section-label">削除する予定を選択</div>
    <div class="sel-list" id="del-list"></div>
    <div class="del-confirm" id="del-confirm">
      <p>この予定を削除しますか？</p>
      <strong id="del-label"></strong>
      <button class="btn-danger" onclick="submitDelete()">削除する</button>
    </div>
  </div>
</div>

<!-- ===================== 時間割ビュー FAB ===================== -->
<div class="fab-overlay" id="tt-fab-overlay" onclick="closeTTFab()"></div>
<div class="fab-wrap" id="tt-fab-wrap" style="display:none">
  <div class="fab-actions" id="tt-fab-actions">
    <div class="fab-action" onclick="openModal('add')">
      <span class="fab-label">追加</span><div class="fab-btn">＋</div>
    </div>
    <div class="fab-action" onclick="openModal('edit')">
      <span class="fab-label">編集</span><div class="fab-btn">✎</div>
    </div>
    <div class="fab-action" onclick="openModal('delete')">
      <span class="fab-label">削除</span><div class="fab-btn">✕</div>
    </div>
    <div class="fab-action" onclick="openTTEditModal()">
      <span class="fab-label">時間割編集</span><div class="fab-btn">📒</div>
    </div>
  </div>
  <button class="fab-main" id="tt-fab-main" onclick="toggleTTFab()">✎</button>
</div>

<!-- ===================== 時間割編集モーダル ===================== -->
<div class="modal-bg" id="modal-tt-edit" onclick="onBgClick(event,'tt-edit')">
  <div class="modal">
    <span class="modal-handle"></span>
    <div class="modal-header">
      <h3>時間割を編集</h3>
      <button class="modal-close" onclick="closeModal('tt-edit')">✕</button>
    </div>
    <div class="success-bar" id="tt-edit-ok">✓ 保存しました！</div>
    <div class="error-bar"   id="tt-edit-err"></div>

    <!-- モード選択 -->
    <div class="field">
      <label>編集タイプ</label>
      <div class="tt-edit-mode-tabs">
        <button class="tt-mode-btn active" id="tt-mode-btn-change" onclick="switchTTMode('change')">授業変更</button>
        <button class="tt-mode-btn"        id="tt-mode-btn-holiday" onclick="switchTTMode('holiday')">休校設定</button>
      </div>
    </div>

    <!-- 対象日付 -->
    <div class="row2">
      <div class="field">
        <label>対象日付</label>
        <div class="date-wrap">
          <div class="date-display" onclick="toggleCal(event,'tt-edit')">
            <span id="tt-edit-date-text" style="color:var(--text-tertiary);font-size:14px">日付を選択</span>
            <span>📅</span>
          </div>
          <div class="cal-pop" id="cal-tt-edit"></div>
        </div>
      </div>
      <!-- 授業変更モードのみ表示 -->
      <div class="field" id="tt-edit-period-field">
        <label>時限</label>
        <select id="tt-edit-period">
          <option value="1">1時限</option>
          <option value="2">2時限</option>
          <option value="3">3時限</option>
          <option value="4">4時限</option>
          <option value="5">5時限</option>
          <option value="6">6時限</option>
        </select>
      </div>
    </div>

    <!-- 授業変更: 変更内容 -->
    <div id="tt-edit-change-fields">
      <div class="row2">
        <div class="field">
          <label>新しい科目名</label>
          <input type="text" id="tt-edit-subject" placeholder="例: 自習、体育1a">
        </div>
        <div class="field">
          <label>持ち物（カンマ区切り）</label>
          <input type="text" id="tt-edit-items" placeholder="例: 教科書,ノート">
        </div>
      </div>
      <div class="field">
        <label>備考</label>
        <input type="text" id="tt-edit-note" placeholder="例: 教室変更、先生変更など（任意）">
      </div>
    </div>

    <!-- 休校: 理由 -->
    <div id="tt-edit-holiday-fields" style="display:none">
      <div class="field">
        <label>休校理由</label>
        <select id="tt-edit-holiday-reason">
          <option value="休校">休校</option>
          <option value="祝日">祝日</option>
          <option value="学校行事">学校行事（終日）</option>
          <option value="振替休日">振替休日</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field">
        <label>備考（任意）</label>
        <input type="text" id="tt-edit-holiday-note" placeholder="例: 文化祭、体育祭など">
      </div>
    </div>

    <button class="btn-primary" id="tt-edit-submit-btn" onclick="submitTTEdit()">保存する</button>

    <!-- 上書き済み一覧 -->
    <div style="margin-top:1.2rem">
      <div class="modal-section-label">保存済みの変更一覧</div>
      <div id="tt-overrides-list" style="max-height:180px;overflow-y:auto"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  設定
// ============================================================
const API_BASE   = "https://python-bot-1istudy.onrender.com/";
const GUILD_ID   = "1509880344806162544";
const JSON_URL   = "https://raw.githubusercontent.com/yuichisana377/python.bot.1istudy/refs/heads/main/plans_1509880344806162544.json";

// ============================================================
//  時間割固定データ
// ============================================================
const TIMETABLE = {
  mon: [
    { subject: "コンピュータリテラシ", items: ["教科書"] },
    { subject: "情報技術概論",         items: ["教科書", "プリント"] },
    { subject: "国語1乙a",             items: ["教科書", "便覧", "古語辞典"] },
  ],
  tue: [
    { subject: "化学1a",     items: ["化学基礎","化学","リードα","フォトサイエンス"] },
    { subject: "情報基礎",   items: ["教科書"] },
    { subject: "線形数学1a", items: ["教科書", "ノート", "ワーク"] },
    { subject: "地理a",      items: ["教科書", "資料集", "地図帳"] },
  ],
  wed: [
    { subject: "物理1a",     items: ["教科書", "プリント","問題集","リードα"] },
    { subject: "体育1a",     items: ["体操服", "教科書"] },
    { subject: "英語会話a",  items: ["教科書", "多読手帳"] },
    { subject: "その他",     items: [] },
  ],
  thu: [
    { subject: "情報工学ゼミ1", items: [] },
    { subject: "公共a",         items: ["教科書", "資料集", "プリント"] },
    { subject: "基礎解析1a",    items: ["教科書", "ワーク", "ノート"] },
    { subject: "国語1甲a",      items: ["教科書","漢字","便覧"] },
  ],
  fri: [
    { subject: "英語表現基礎a",        items: ["教科書","vision quest","ワーク","辞書","プリント"] },
    { subject: "基礎解析1a",             items: ["教科書", "ノート","ワーク"] },
    { subject: "英語コミュニケーション1a", items: ["教科書","スタディーノート","単語帳"] },
  ],
};

const DAY_KEYS  = ["mon","tue","wed","thu","fri"];
const DAY_NAMES = ["月","火","水","木","金"];
const DAY_CLASS = ["d-mon","d-tue","d-wed","d-thu","d-fri"];
const WDAYS_ALL = ['日','月','火','水','木','金','土'];

// ============================================================
//  グローバル状態
// ============================================================
let currentApp   = 'plan';   // 'plan' | 'tt'
let plans        = [];
let channels     = [];
let calState     = {};
let editTarget   = null;
let delTarget    = null;

// 時間割状態
let weekOffset  = 0;
let ttActiveDay = 0;
let ttHomeworks = [];

// 時間割上書きデータ { key: "YYYY-MM-DD", type: "change"|"holiday", period, subject, items, note, reason }
let ttOverrides = {};

// =============================================
//  時間割編集APIエンドポイント
//  ※ サーバー側に実装したエンドポイント名に合わせて変更してください
// =============================================
const TT_API = {
  UPDATE:  '/update_timetable',   // POST: { guild_id, date, period, subject, items, note }
  HOLIDAY: '/set_holiday',        // POST: { guild_id, date, reason, note }
  DELETE:  '/delete_timetable',   // POST: { guild_id, key }
  LIST:    '/list_timetable',     // GET:  ?guild_id=...
};

// ============================================================
//  起動
// ============================================================
window.addEventListener('load', () => {
  loadChannels();
  loadPlans();
  loadTTHomeworks();
  loadTTOverrides();

  // 時間割の初期曜日
  const today = new Date().getDay();
  if (today >= 1 && today <= 5) {
    ttActiveDay = today - 1;
  } else {
    ttActiveDay = 0;
  }

  // 時間割を初回描画しておく（切り替え時に「読み込み中」で止まらないように）
  renderTimetable();
});

// ============================================================
//  ドロワー
// ============================================================
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ============================================================
//  アプリ切り替え
// ============================================================
function switchApp(app) {
  closeDrawer();
  currentApp = app;

  document.getElementById('view-plan').classList.toggle('active', app === 'plan');
  document.getElementById('view-tt').classList.toggle('active',   app === 'tt');

  document.getElementById('plan-tabs').style.display   = (app === 'plan') ? '' : 'none';
  document.getElementById('tt-week-nav').style.display = (app === 'tt')   ? '' : 'none';
  document.getElementById('header-title').textContent  = (app === 'plan') ? '予定管理' : '時間割';

  document.getElementById('fab-wrap').style.display    = (app === 'plan') ? '' : 'none';
  document.getElementById('tt-fab-wrap').style.display = (app === 'tt')   ? '' : 'none';

  document.getElementById('menu-plan').classList.toggle('active', app === 'plan');
  document.getElementById('menu-tt').classList.toggle('active',   app === 'tt');

  if (app === 'tt') setTimeout(() => renderTimetable(), 0);
}

// ============================================================
//  予定管理 — サブビュー切り替え
// ============================================================
function switchPlanView(v) {
  document.querySelectorAll('#plan-tabs .view-btn').forEach((b, i) => {
    b.classList.toggle('active', ['plan','log'][i] === v);
  });
  document.getElementById('plan-sub-plan').classList.toggle('active', v === 'plan');
  document.getElementById('plan-sub-log').classList.toggle('active',  v === 'log');
  if (v === 'log') loadLogs();
}

// ============================================================
//  予定管理 API
// ============================================================
async function api(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { "Content-Type": "application/json" }, ...opts
  });
  return res.json();
}

async function loadChannels() {
  try {
    const data = await api(`/channels?guild_id=${GUILD_ID}`);
    channels = data.ok ? data.channels : [];
    renderChannelOptions();
  } catch(e) { channels = []; renderChannelOptions(); }
}

async function loadPlans() {
  document.getElementById('plan-loading').style.display = 'block';
  document.getElementById('plan-content').innerHTML = '';
  try {
    const data = await api(`/list_schedule?guild_id=${GUILD_ID}`);
    plans = data.ok ? data.plans : [];
  } catch(e) { plans = []; }
  document.getElementById('plan-loading').style.display = 'none';
  renderPlans();
}

async function loadLogs() {
  document.getElementById('log-loading').style.display = 'block';
  document.getElementById('log-content').innerHTML = '';
  try {
    const data = await api(`/list_logs?guild_id=${GUILD_ID}`);
    renderLogs(data.ok ? data.logs : []);
  } catch(e) { renderLogs([]); }
  document.getElementById('log-loading').style.display = 'none';
}

// ============================================================
//  時間割 — JSON読み込み
// ============================================================
async function loadTTHomeworks() {
  try {
    const res  = await fetch(JSON_URL);
    const data = await res.json();
    ttHomeworks = Array.isArray(data) ? data : [];
  } catch(e) {
    ttHomeworks = [];
  }
  if (currentApp === 'tt') renderTimetable();
}

// ============================================================
//  予定一覧 描画
// ============================================================
const WDAYS = ['日','月','火','水','木','金','土'];

function parsePlanContent(raw) {
  const cat  = raw.match(/^【(.+?)】/)?.[1] || '';
  const text = raw.replace(/^【.+?】/, '').trim();
  return { cat, text };
}

function renderPlans() {
  const el = document.getElementById('plan-content');
  if (!plans.length) { el.innerHTML = '<div class="empty-msg">予定はありません</div>'; return; }
  const today   = new Date().toISOString().split('T')[0];
  const grouped = {};
  plans.forEach(p => { (grouped[p.date] = grouped[p.date] || []).push(p); });
  el.innerHTML = Object.keys(grouped).sort().map(date => {
    const d = new Date(date + 'T00:00:00');
    const label = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WDAYS[d.getDay()]}）`;
    const isToday = date === today;
    const rows = grouped[date].map(p => {
      const { cat, text } = parsePlanContent(p.content);
      return `<div class="plan-row">
        <span class="subject">${p.subject}</span>
        <span class="badge badge-${cat}">${cat}</span>
        <span class="content">${text}</span>
      </div>`;
    }).join('');
    return `<div class="date-group">
      <div class="date-label">${label}${isToday ? '<span class="today-tag">今日</span>' : ''}</div>
      <div class="date-card">${rows}</div>
    </div>`;
  }).join('');
}

// ============================================================
//  ログ 描画
// ============================================================
const TYPE_LABEL = { add:'追加', edit:'編集', delete:'削除', cleanup:'自動削除' };

function renderLogs(logs) {
  const el = document.getElementById('log-content');
  if (!logs.length) { el.innerHTML = '<div class="empty-msg">ログはありません</div>'; return; }
  el.innerHTML = logs.map(l => `
    <div class="tl-item">
      <div class="tl-dot dot-${l.type}"></div>
      <div class="tl-time">${l.time}</div>
      <div class="tl-card">
        <div class="tl-type type-${l.type}">${TYPE_LABEL[l.type] || l.type}</div>
        <div class="tl-detail">${l.detail}</div>
      </div>
    </div>`).join('');
}

// ============================================================
//  科目セレクト
// ============================================================
function renderChannelOptions() {
  const opts = channels.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  document.getElementById('add-subject').innerHTML  = opts || '<option value="">（なし）</option>';
  document.getElementById('edit-subject').innerHTML = '<option value="">— 変更しない —</option>' + opts;
}

// ============================================================
//  選択リスト（編集・削除）
// ============================================================
function renderSelectList(containerId, mode) {
  const el = document.getElementById(containerId);
  if (!plans.length) { el.innerHTML = '<div class="empty-msg">予定がありません</div>'; return; }
  el.innerHTML = plans.map(p => {
    const label = `${p.date}/${p.subject}${p.content}`;
    const { cat, text } = parsePlanContent(p.content);
    return `<div class="sel-item" data-label="${label}" onclick="selectPlan(this,'${mode}')">
      <span class="si-date">${p.date}</span>
      <span class="si-subject">${p.subject}</span>
      <span class="badge badge-${cat}">${cat}</span>
      <span class="si-content">${text}</span>
    </div>`;
  }).join('');
}

function selectPlan(el, mode) {
  el.closest('.sel-list').querySelectorAll('.sel-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  if (mode === 'edit') {
    editTarget = el.dataset.label;
  } else {
    delTarget = el.dataset.label;
    document.getElementById('del-label').textContent = el.dataset.label;
    document.getElementById('del-confirm').style.display = 'block';
  }
}

//  FAB
// ============================================================
function toggleFab() {
  const open = !document.getElementById('fab-actions').classList.contains('open');
  document.getElementById('fab-actions').classList.toggle('open', open);
  document.getElementById('fab-main').classList.toggle('open', open);
  document.getElementById('fab-overlay').classList.toggle('open', open);
}
function closeFab() {
  document.getElementById('fab-actions').classList.remove('open');
  document.getElementById('fab-main').classList.remove('open');
  document.getElementById('fab-overlay').classList.remove('open');
}

function openModal(name) {
  closeFab();
  document.getElementById('modal-' + name).classList.add('open');
  if (name === 'add')    initCal('add', false);
  if (name === 'edit')   { initCal('edit', true); editTarget = null; renderSelectList('edit-list', 'edit'); }
  if (name === 'delete') { delTarget = null; renderSelectList('del-list', 'delete'); document.getElementById('del-confirm').style.display = 'none'; }
}
function closeModal(name) {
  document.getElementById('modal-' + name).classList.remove('open');
  document.querySelectorAll('.cal-pop').forEach(p => p.classList.remove('open'));
}
function onBgClick(e, name) {
  if (e.target === document.getElementById('modal-' + name)) closeModal(name);
}

// ============================================================
//  API送信
// ============================================================
async function submitAdd() {
  const date     = calState['add']?.selected;
  const subject  = document.getElementById('add-subject').value;
  const category = getCatValue('add');
  if (!category) { showErr('add-err', 'カテゴリを入力してください'); return; }
  const content  = document.getElementById('add-content').value.trim();
  if (!date || !subject || !content) { showErr('add-err', '日付・科目・内容は必須です'); return; }

  const btn = document.querySelector('#modal-add .btn-primary');
  setLoading(btn, '登録中…');
  try {
    const res = await api('/add_schedule', {
      method: 'POST',
      body: JSON.stringify({ guild_id: GUILD_ID, date, subject, category, content })
    });
    resetLoading(btn, '追加する');
    if (res.ok) {
      showOk('add-ok');
      document.getElementById('add-content').value = '';
      resetCal('add', '日付を選択');
      await loadPlans();
    } else {
      showErr('add-err', res.message || 'エラーが発生しました');
    }
  } catch(e) {
    resetLoading(btn, '追加する');
    showErr('add-err', 'サーバーに接続できませんでした');
  }
}

async function submitEdit() {
  if (!editTarget) { showErr('edit-err', '予定を選択してください'); return; }
  const body = { guild_id: GUILD_ID, target: editTarget };
  const d = calState['edit']?.selected; if (d) body.date = d;
  const s = document.getElementById('edit-subject').value;   if (s) body.subject = s;
  const c = getCatValue('edit'); if (c) body.category = c;
  const t = document.getElementById('edit-content').value.trim(); if (t) body.content = t;

  const btn = document.querySelector('#modal-edit .btn-primary');
  setLoading(btn, '保存中…');
  try {
    const res = await api('/edit_schedule', { method: 'POST', body: JSON.stringify(body) });
    resetLoading(btn, '保存する');
    if (res.ok) {
      showOk('edit-ok');
      editTarget = null;
      document.getElementById('edit-content').value = '';
      document.getElementById('edit-category-sel').value = '';
      document.getElementById('edit-category-inp').style.display = 'none';
      document.getElementById('edit-subject').value = '';
      resetCal('edit', '変更しない場合は空欄');
      await loadPlans();
      renderSelectList('edit-list', 'edit');
    } else {
      showErr('edit-err', res.message || 'エラーが発生しました');
    }
  } catch(e) {
    resetLoading(btn, '保存する');
    showErr('edit-err', 'サーバーに接続できませんでした');
  }
}

async function submitDelete() {
  if (!delTarget) return;
  const btn = document.querySelector('#del-confirm .btn-danger');
  setLoading(btn, '削除中…', true);
  try {
    const res = await api('/delete_schedule', {
      method: 'POST', body: JSON.stringify({ guild_id: GUILD_ID, target: delTarget })
    });
    resetLoading(btn, '削除する');
    if (res.ok) {
      showOk('del-ok');
      document.getElementById('del-confirm').style.display = 'none';
      delTarget = null;
      await loadPlans();
      renderSelectList('del-list', 'delete');
    } else {
      showErr('del-err', res.message || 'エラーが発生しました');
    }
  } catch(e) {
    resetLoading(btn, '削除する');
    showErr('del-err', 'サーバーに接続できませんでした');
  }
}

// ============================================================
//  メッセージ helper
// ============================================================
function setLoading(btn, label, dark = false) {
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner${dark ? ' spinner-dark' : ''}"></span>${label}`;
}
function resetLoading(btn, label) {
  btn.disabled = false;
  btn.textContent = label;
}
function showOk(id) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = '✕ ' + msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// ============================================================
//  カスタムカレンダー（予定管理）
// ============================================================
const CAL_D = ['日','月','火','水','木','金','土'];
const CAL_M = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function initCal(id, allowPast) {
  const now = new Date();
  calState[id] = { year: now.getFullYear(), month: now.getMonth(), selected: null, allowPast };
  renderCal(id);
}
function resetCal(id, placeholder) {
  if (calState[id]) { calState[id].selected = null; renderCal(id); }
  const el = document.getElementById(id + '-date-text');
  if (el) { el.textContent = placeholder; el.style.color = 'var(--text-tertiary)'; }
}
function renderCal(id) {
  const s = calState[id]; if (!s) return;
  const el = document.getElementById('cal-' + id); if (!el) return;
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const firstDay = new Date(s.year, s.month, 1).getDay();
  const dim = new Date(s.year, s.month+1, 0).getDate();

  let html = `<div class="cal-head">
    <button class="cal-nav-btn" onclick="moveCal(event,'${id}',-1)">‹</button>
    <span>${s.year}年 ${CAL_M[s.month]}</span>
    <button class="cal-nav-btn" onclick="moveCal(event,'${id}',1)">›</button>
  </div><div class="cal-grid">`;
  CAL_D.forEach(d => { html += `<div class="cal-dow">${d}</div>`; });
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day emp"></div>`;
  for (let d = 1; d <= dim; d++) {
    const ds = `${s.year}-${String(s.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isPast = !s.allowPast && ds < todayStr;
    let cls = 'cal-day';
    if (isPast) cls += ' dis';
    if (ds === todayStr && ds !== s.selected) cls += ' tod';
    if (ds === s.selected) cls += ' sel';
    const click = isPast ? '' : `onclick="pickDate(event,'${id}','${ds}')"`;
    html += `<div class="${cls}" ${click}>${d}</div>`;
  }
  el.innerHTML = html + '</div>';
}
function moveCal(e, id, dir) {
  e.stopPropagation();
  const s = calState[id];
  s.month += dir;
  if (s.month < 0)  { s.month = 11; s.year--; }
  if (s.month > 11) { s.month = 0;  s.year++; }
  renderCal(id);
}
function getCatValue(prefix) {
  const sel = document.getElementById(prefix + '-category-sel');
  if (sel.value === '__custom__') {
    return document.getElementById(prefix + '-category-inp').value.trim();
  }
  return sel.value;
}
function onCatSel(prefix) {
  const sel = document.getElementById(prefix + '-category-sel');
  const inp = document.getElementById(prefix + '-category-inp');
  if (sel.value === '__custom__') { inp.style.display = 'block'; inp.focus(); }
  else { inp.style.display = 'none'; }
}
function pickDate(e, id, ds) {
  e.stopPropagation();
  calState[id].selected = ds;
  const [y, m, d] = ds.split('-');
  const el = document.getElementById(id + '-date-text');
  el.textContent = `${y}年${parseInt(m)}月${parseInt(d)}日`;
  el.style.color = 'var(--text)';
  document.getElementById('cal-' + id).classList.remove('open');
  renderCal(id);
}
function toggleCal(e, id) {
  e.stopPropagation();
  const el = document.getElementById('cal-' + id);
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.cal-pop').forEach(p => p.classList.remove('open'));
  if (!wasOpen) {
    el.classList.add('open');
    setTimeout(() => {
      const rect  = el.getBoundingClientRect();
      const modal = el.closest('.modal');
      if (modal && rect.bottom > window.innerHeight - 20) {
        modal.scrollBy({ top: rect.bottom - window.innerHeight + 30, behavior: 'smooth' });
      }
    }, 30);
  }
}
document.addEventListener('click', e => {
  if (!e.target.closest('.date-wrap')) document.querySelectorAll('.cal-pop').forEach(p => p.classList.remove('open'));
});

// ============================================================
//  時間割 描画
// ============================================================
function getWeekDates() {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + weekOffset * 7);
  return DAY_KEYS.map((_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}
function formatWeekLabel(dates) {
  const s = dates[0], e = dates[4];
  return `${s.getMonth()+1}/${s.getDate()} 〜 ${e.getMonth()+1}/${e.getDate()}`;
}
function getDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getTodayDayIndex() {
  const d = new Date().getDay();
  if (d >= 1 && d <= 5) return d - 1;
  return -1;
}

function moveWeek(dir) {
  weekOffset += dir;
  renderTimetable();
}
function goToday() {
  weekOffset = 0;
  const today = new Date().getDay();
  ttActiveDay = (today >= 1 && today <= 5) ? today - 1 : 0;
  renderTimetable();
}

function renderTimetable() {
  const dates      = getWeekDates();
  const todayIdx   = getTodayDayIndex();
  const isThisWeek = weekOffset === 0;

  const weekLabelEl = document.getElementById('week-label');
  const main        = document.getElementById('tt-main-content');
  if (!weekLabelEl || !main) return;
  weekLabelEl.textContent = formatWeekLabel(dates);

  // 今日バナー
  let bannerHtml = '';
  if (isThisWeek && todayIdx >= 0) {
    const td = dates[todayIdx];
    bannerHtml = `<div class="today-banner">
      <div class="today-dot"></div>
      <div class="today-banner-text">
        <span class="today-banner-day">${td.getMonth()+1}月${td.getDate()}日（${DAY_NAMES[todayIdx]}）</span>　今日
      </div>
    </div>`;
  }

  // 曜日タブ
  const tabsHtml = `<div class="day-tabs">
    ${DAY_KEYS.map((k, i) => {
      const d = dates[i];
      const isToday  = isThisWeek && i === todayIdx;
      const isActive = i === ttActiveDay;
      return `<button class="day-tab ${DAY_CLASS[i]}${isActive ? ' active' : ''}${isToday ? ' is-today' : ''}"
        onclick="ttSwitchDay(${i})">
        <span class="tab-day">${DAY_NAMES[i]}</span>
        <span class="tab-date">${d.getMonth()+1}/${d.getDate()}</span>
      </button>`;
    }).join('')}
  </div>`;

  // 時間割本体（オーバーライド適用）
  const dayDate  = dates[ttActiveDay];
  const dayKey   = DAY_KEYS[ttActiveDay];
  const dayName  = DAY_NAMES[ttActiveDay];
  const dayClass = DAY_CLASS[ttActiveDay];
  const dateStr  = getDateStr(dayDate);

  // 休校チェック
  const holidayKey = `holiday:${dateStr}`;
  const holidayOv  = ttOverrides[holidayKey];

  // 基本時間割 or オーバーライドで差し替え
  const basePeriods = TIMETABLE[dayKey] || [];

  let periodsHtml = '';
  if (holidayOv) {
    // 休校表示
    const reason = holidayOv.reason || '休校';
    const note   = holidayOv.note   ? `（${holidayOv.note}）` : '';
    periodsHtml = `<div class="period-row" style="justify-content:center;padding:1.5rem">
      <div style="text-align:center">
        <div style="font-size:22px;margin-bottom:6px">🏫</div>
        <div style="font-size:15px;font-weight:700;color:var(--text)">${reason}${note}</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px">この日は授業がありません</div>
      </div>
    </div>`;
  } else {
    periodsHtml = basePeriods.map((p, i) => {
      const periodNum = i + 1;
      // コマ単位オーバーライドチェック
      const changeKey = `change:${dateStr}:${periodNum}`;
      const changeOv  = ttOverrides[changeKey];

      const subject = changeOv ? (changeOv.subject || p.subject) : p.subject;
      const items   = changeOv ? (changeOv.items   || [])        : p.items;
      const isChanged = !!changeOv;

      const hw = ttHomeworks.filter(h => h.date === dateStr && h.subject === subject);
      const itemsHtml = items.length
        ? `<div class="items-row">${items.map(it => `<span class="item-tag">📎 ${it}</span>`).join('')}</div>`
        : '';
      const hwHtml = hw.map(h => {
        const cat  = h.content.match(/^【(.+?)】/)?.[1] || '';
        const text = h.content.replace(/^【.+?】/, '').trim();
        return `<div class="homework-row">
          <span class="tt-badge tt-badge-${cat}">${cat}</span>
          <span class="homework-text">${text}</span>
        </div>`;
      }).join('');
      const noteHtml = (changeOv && changeOv.note)
        ? `<div style="font-size:11px;color:#1e40af;margin-top:2px">📝 ${changeOv.note}</div>` : '';
      const changedBadge = isChanged
        ? `<span style="font-size:10px;background:#dbeafe;color:#1e40af;padding:1px 6px;border-radius:20px;font-weight:700;margin-left:4px">変更</span>` : '';

      return `<div class="period-row">
        <div class="period-num">${periodNum}</div>
        <div class="period-subject${subject ? '' : ' empty'}">${subject || 'ー'}${changedBadge}</div>
        <div class="period-right">
          ${itemsHtml}
          ${hwHtml}
          ${noteHtml}
        </div>
      </div>`;
    }).join('');
  }

  const timetableHtml = `<div class="timetable-card ${dayClass}">
    <div class="tt-card-header ${dayClass}">
      <div class="tt-card-header-dot"></div>
      <div class="tt-card-header-title">${dayName}曜日の時間割</div>
      <div class="tt-card-header-date">${dayDate.getMonth()+1}月${dayDate.getDate()}日</div>
    </div>
    ${periodsHtml}
  </div>`;

  main.innerHTML = bannerHtml + tabsHtml + timetableHtml;
}

function ttSwitchDay(idx) {
  ttActiveDay = idx;
  renderTimetable();
}

// ============================================================
//  時間割オーバーライド — API
// ============================================================
async function loadTTOverrides() {
  try {
    const res  = await fetch(`${API_BASE}${TT_API.LIST}?guild_id=${GUILD_ID}`);
    const data = await res.json();
    if (data.ok && Array.isArray(data.overrides)) {
      ttOverrides = {};
      data.overrides.forEach(o => { ttOverrides[o.key] = o; });
    }
  } catch(e) {
    // API未実装の場合はLocalStorageから読み込む
    try {
      const raw = localStorage.getItem('tt_overrides_' + GUILD_ID);
      ttOverrides = raw ? JSON.parse(raw) : {};
    } catch(_) { ttOverrides = {}; }
  }
  if (currentApp === 'tt') renderTimetable();
}

function saveTTOverrideLocal() {
  localStorage.setItem('tt_overrides_' + GUILD_ID, JSON.stringify(ttOverrides));
}

// ============================================================
//  時間割編集モーダル
// ============================================================
let ttEditMode = 'change'; // 'change' | 'holiday'

function openTTEditModal() {
  closeTTFab();
  closeFab();
  ttEditMode = 'change';
  initCal('tt-edit', true);
  resetTTEditForm();
  renderTTOverridesList();
  document.getElementById('modal-tt-edit').classList.add('open');
}

function resetTTEditForm() {
  document.getElementById('tt-edit-subject').value       = '';
  document.getElementById('tt-edit-items').value         = '';
  document.getElementById('tt-edit-note').value          = '';
  document.getElementById('tt-edit-holiday-note').value  = '';
  document.getElementById('tt-edit-holiday-reason').value = '休校';
  document.getElementById('tt-edit-period').value        = '1';
  resetCal('tt-edit', '日付を選択');
}

function switchTTMode(mode) {
  ttEditMode = mode;
  document.getElementById('tt-mode-btn-change').classList.toggle('active',  mode === 'change');
  document.getElementById('tt-mode-btn-holiday').classList.toggle('active', mode === 'holiday');
  document.getElementById('tt-edit-change-fields').style.display  = (mode === 'change')  ? '' : 'none';
  document.getElementById('tt-edit-holiday-fields').style.display = (mode === 'holiday') ? '' : 'none';
  document.getElementById('tt-edit-period-field').style.display   = (mode === 'change')  ? '' : 'none';
}

async function submitTTEdit() {
  const date = calState['tt-edit']?.selected;
  if (!date) { showErr('tt-edit-err', '日付を選択してください'); return; }

  const btn = document.getElementById('tt-edit-submit-btn');
  setLoading(btn, '保存中…');

  try {
    if (ttEditMode === 'holiday') {
      const reason = document.getElementById('tt-edit-holiday-reason').value;
      const note   = document.getElementById('tt-edit-holiday-note').value.trim();
      const key    = `holiday:${date}`;
      const payload = { guild_id: GUILD_ID, date, reason, note, key };

      let saved = false;
      try {
        const res  = await api(TT_API.HOLIDAY, { method: 'POST', body: JSON.stringify(payload) });
        if (res.ok) saved = true;
      } catch(_) {}

      // LocalStorageにも保存（APIが未実装でもUIに反映）
      ttOverrides[key] = { key, type: 'holiday', date, reason, note };
      saveTTOverrideLocal();

      resetLoading(btn, '保存する');
      showOk('tt-edit-ok');
      resetTTEditForm();
      renderTTOverridesList();
      renderTimetable();

    } else {
      const period  = parseInt(document.getElementById('tt-edit-period').value);
      const subject = document.getElementById('tt-edit-subject').value.trim();
      const itemsRaw = document.getElementById('tt-edit-items').value.trim();
      const items   = itemsRaw ? itemsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
      const note    = document.getElementById('tt-edit-note').value.trim();

      if (!subject) { resetLoading(btn, '保存する'); showErr('tt-edit-err', '科目名を入力してください'); return; }

      const key     = `change:${date}:${period}`;
      const payload = { guild_id: GUILD_ID, date, period, subject, items, note, key };

      try {
        await api(TT_API.UPDATE, { method: 'POST', body: JSON.stringify(payload) });
      } catch(_) {}

      ttOverrides[key] = { key, type: 'change', date, period, subject, items, note };
      saveTTOverrideLocal();

      resetLoading(btn, '保存する');
      showOk('tt-edit-ok');
      resetTTEditForm();
      renderTTOverridesList();
      renderTimetable();
    }
  } catch(e) {
    resetLoading(btn, '保存する');
    showErr('tt-edit-err', '保存に失敗しました: ' + e.message);
  }
}

async function deleteTTOverride(key) {
  try {
    await api(TT_API.DELETE, { method: 'POST', body: JSON.stringify({ guild_id: GUILD_ID, key }) });
  } catch(_) {}
  delete ttOverrides[key];
  saveTTOverrideLocal();
  renderTTOverridesList();
  renderTimetable();
}

function renderTTOverridesList() {
  const el   = document.getElementById('tt-overrides-list');
  const keys = Object.keys(ttOverrides).sort();
  if (!keys.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--text-tertiary);padding:10px 0">保存済みの変更はありません</div>';
    return;
  }
  el.innerHTML = keys.map(key => {
    const ov = ttOverrides[key];
    let info = '', badge = '';
    if (ov.type === 'holiday') {
      const note = ov.note ? `（${ov.note}）` : '';
      info  = `${ov.date}　${ov.reason}${note}`;
      badge = `<span class="override-badge-holiday">休校</span>`;
    } else {
      info  = `${ov.date} ${ov.period}限 → ${ov.subject}`;
      badge = `<span class="override-badge-change">変更</span>`;
    }
    return `<div class="override-row">
      <div class="override-info">${badge} ${info}</div>
      <button class="override-del-btn" onclick="deleteTTOverride('${key}')" title="削除">✕</button>
    </div>`;
  }).join('');
}
