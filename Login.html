<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ログイン — 1I勉強会</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="stylesheet" href="/Style.css">
<link rel="stylesheet" href="/Login.css">
</head>
<body>

<main class="login-wrap">

  <!-- ロゴ -->
  <div class="login-logo">
    <div class="login-logo-icon">📚</div>
    <div class="login-logo-name">1I 勉強会web</div>
    <div class="login-logo-sub">勉強ログ・予定管理・カード学習</div>
  </div>

  <!-- ══ ローディング（自動ログイン確認中） ══ -->
  <div class="login-step login-card" id="step-loading" style="display:none">
    <div class="login-loading-wrap">
      <div class="login-spinner-lg"></div>
      <div class="login-loading-msg" id="loading-msg">確認中…</div>
    </div>
  </div>

  <!-- ══ STEP 1: 学籍番号入力 ══ -->
  <div class="login-step login-card" id="step-id" style="display:none">
    <h1 class="login-title">ログイン</h1>

    <div class="error-bar" id="id-err" style="display:none"></div>

    <div class="field">
      <label for="inp-student-id">学籍番号</label>
      <input type="text" id="inp-student-id"
             placeholder="例: 32600"
             autocomplete="username"
             autocapitalize="characters"
             maxlength="20">
    </div>

    <button class="btn-primary login-btn" id="btn-login" onclick="submitId()">
      ログイン →
    </button>

    <p class="login-hint">
      初めての方は登録画面へ自動で案内します。
    </p>
  </div>

  <!-- ══ STEP 2: 新規登録（初回のみ） ══ -->
  <div class="login-step login-card" id="step-register" style="display:none">
    <h1 class="login-title">新規登録 👋</h1>

    <p class="login-reg-desc">
      <strong id="reg-id-label"></strong> はまだ登録されていません。<br>
      呼ばれたいニックネームを入力して登録してください。<br>
      <span class="login-reg-note">※ 本名は禁止・公開されます</span>
    </p>

    <input type="hidden" id="inp-student-id-hidden">

    <div class="error-bar" id="reg-err" style="display:none"></div>

    <div class="field">
      <label for="inp-nickname">ニックネーム</label>
      <input type="text" id="inp-nickname"
             placeholder="例: Taro・太郎（16文字以内）"
             maxlength="16"
             autocomplete="nickname">
    </div>

    <button class="btn-primary login-btn" id="btn-register" onclick="submitRegister()">
      登録してログイン ✓
    </button>

    <button class="login-back-btn" onclick="backToId()">
      ← 学籍番号の入力に戻る
    </button>
  </div>

</main>

<script src="/Login.js"></script>
</body>
</html>
