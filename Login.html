<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ログイン — 1I勉強会</title>
<link rel="stylesheet" href="/Style.css">
<link rel="stylesheet" href="/Login.css">
</head>
<body>

<main class="login-wrap">

  <!-- ロゴ -->
  <div class="login-logo">
    <div class="login-logo-icon">📚</div>
    <div class="login-logo-name">1I 学習サポート</div>
    <div class="login-logo-sub">勉強ログ・予定管理・カード学習</div>
  </div>

  <!-- ══ STEP 1: 学籍番号入力 ══ -->
  <div class="login-card login-step" id="step-id">
    <h1 class="login-title">ログイン</h1>

    <div class="error-bar" id="id-err" style="display:none"></div>

    <div class="field">
      <label for="inp-student-id">学籍番号</label>
      <input type="text" id="inp-student-id"
             placeholder="例: 1I001"
             autocomplete="username"
             autocapitalize="characters"
             maxlength="20">
    </div>

    <button class="btn-primary login-btn" onclick="submitId()">
      つぎへ →
    </button>

    <div class="login-hint">
      初めての方はニックネーム登録に進みます。
    </div>
  </div>

  <!-- ══ STEP 2: ニックネーム登録（初回のみ） ══ -->
  <div class="login-card login-step" id="step-register" style="display:none">
    <h1 class="login-title">はじめまして 👋</h1>
    <p class="login-reg-desc">
      学籍番号 <strong id="reg-student-id-label"></strong> は初めてのログインです。<br>
      呼ばれたいニックネームを登録してください。
    </p>

    <input type="hidden" id="inp-student-id-hidden">

    <div class="error-bar" id="reg-err" style="display:none"></div>

    <div class="field">
      <label for="inp-nickname">ニックネーム</label>
      <input type="text" id="inp-nickname"
             placeholder="例: Yuki（16文字以内）"
             maxlength="16"
             autocomplete="nickname">
    </div>

    <button class="btn-primary login-btn" onclick="submitRegister()">
      登録してログイン ✓
    </button>

    <button class="login-back-btn" onclick="backToId()">
      ← 学籍番号の入力に戻る
    </button>
  </div>

</main>

<script src="/Login.js"></script>
</body>
</html>
