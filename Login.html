<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ログイン — 1I勉強会</title>
<link rel="stylesheet" href="/Style.css">
<link rel="stylesheet" href="/Login.css">
</head>
<body>

<main class="login-wrap">

  <!-- ロゴ -->
  <div class="login-logo">
    <div class="login-logo-icon">📚</div>
    <div class="login-logo-name">1I 学習サポート</div>
    <div class="login-logo-sub">勉強ログ・予定管理・カード学習</div>
  </div>

  <!-- ログインカード -->
  <div class="login-card">
    <h1 class="login-title">ログイン</h1>

    <div class="error-bar" id="login-err" style="display:none"></div>

    <div class="field">
      <label for="sel-user">アカウントを選択</label>
      <select id="sel-user">
        <option value="">— 選択してください —</option>
      </select>
    </div>

    <div class="field">
      <label for="inp-password">パスワード</label>
      <div class="login-pw-wrap">
        <input type="password" id="inp-password"
               placeholder="パスワードを入力"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doLogin()">
        <button class="login-pw-toggle" onclick="togglePw()" aria-label="表示切替">👁</button>
      </div>
    </div>

    <button class="btn-primary login-btn" onclick="doLogin()">
      ログイン
    </button>

    <div class="login-hint">
      ※ サンプルアカウントのパスワードはすべて <code>1234</code> です
    </div>
  </div>

  <!-- サンプルユーザー一覧 -->
  <div class="login-sample-wrap">
    <div class="login-sample-title">サンプルアカウント</div>
    <div class="login-sample-grid" id="sample-grid"></div>
  </div>

</main>

<script src="/Login.js"></script>
</body>
</html>
