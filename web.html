<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>予定一覧</title>
  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }

    h2 {
      margin-top: 25px;
      padding: 8px 12px;
      background: #e3eaff;
      border-left: 5px solid #4a6cff;
      border-radius: 4px;
    }

    p {
      margin: 4px 0 4px 12px;
      padding: 4px 8px;
      background: white;
      border-radius: 4px;
      border-left: 6px solid #ccc;
    }

    .submit, .homework {
      background: #ffe3e3;
    }

    .bring {
      background: #e6ffed;
    }
  </style>
</head>
<body>

  <h1>予定一覧</h1>
  <div id="status" style="margin-bottom: 10px; color: #666;"></div>


  <label>サーバーID：</label>
  <input id="serverId" value="1509880344806162544">
  <button onclick="loadData()">読み込む</button>

  <div id="schedule"></div>

  <script src="app.js"></script>

  <!-- ▼ 自動更新（60秒ごと） ▼ -->
  <script src="app.js"></script>

    <script>
      // ページ読み込み時に1回実行
    window.onload = () => {
      loadData();
    };

    // 60秒ごとに自動更新
    setInterval(() => {
        loadData();
    }, 60000);
</script>

</html>
